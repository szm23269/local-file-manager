<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--bg4:#333;
  --accent:#0078d4;--accent2:#005a9e;
  --text:#d4d4d4;--text-dim:#888;--text-bright:#fff;
  --border:#3d3d3d;--sel:#1e3a5f;--sel-border:#0078d4;
  --hover:#2a2d2e;--tab-h:32px;--toolbar-h:40px;--status-h:24px;
  --addr-h:30px;--header-h:28px;
}
body{background:var(--bg);color:var(--text);font:13px/1.4 "Segoe UI",system-ui,sans-serif;
  display:flex;flex-direction:column;height:100vh;overflow:hidden;user-select:none}

/* ── SIDEBAR（お気に入り＋ツリー） ── */
#sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#sidebar.hidden{display:none}
/* お気に入り */
#fav-panel{display:flex;flex-direction:column;flex-shrink:0;height:168px;min-height:52px;overflow:hidden}
.panel-header{height:28px;background:var(--bg3);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px 0 10px;font-size:11px;color:var(--text-dim);
  gap:4px;flex-shrink:0}
.panel-header-label{flex:1}
.panel-header-btn{height:18px;background:transparent;border:1px solid transparent;
  color:var(--text-dim);border-radius:3px;cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;white-space:nowrap}
.panel-header-btn:hover{background:var(--hover);border-color:var(--border);color:var(--text)}
#fav-list{flex:1;overflow-y:auto;padding:2px 0}
#fav-list::-webkit-scrollbar{width:4px}
#fav-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.fav-item{display:flex;align-items:center;height:24px;padding:0 4px 0 6px;cursor:pointer;
  font-size:12px;gap:5px}
.fav-item:hover{background:var(--hover)}
.fav-item:hover .fav-remove{opacity:1}
.fav-item.fav-active{background:var(--sel)}
.fav-icon{font-size:13px;flex-shrink:0}
.fav-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-remove{width:14px;height:14px;opacity:0;border-radius:2px;display:flex;align-items:center;
  justify-content:center;font-size:9px;color:var(--text-dim);flex-shrink:0;transition:opacity .1s}
.fav-remove:hover{opacity:1!important;background:rgba(255,255,255,.15);color:#f87171}
.fav-drop-hint{outline:1px dashed var(--accent)!important}
.fav-handle{width:10px;cursor:grab;opacity:0;flex-shrink:0;font-size:11px;line-height:1;
  color:var(--text-dim);user-select:none;text-align:center}
.fav-item:hover .fav-handle{opacity:.45}
.fav-handle:active{cursor:grabbing}
.fav-item.fav-dragging{opacity:.35}
.fav-item.fav-drop-above{box-shadow:inset 0 2px 0 var(--accent)}
.fav-item.fav-drop-below{box-shadow:inset 0 -2px 0 var(--accent)}
/* お気に入り↔ツリー 水平リサイズ */
#fav-resize{height:4px;background:var(--border);cursor:row-resize;flex-shrink:0}
#fav-resize:hover,#fav-resize.dragging{background:var(--accent)}
/* ツリー内部 */
#tree-inner{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:40px}
.tree-header{height:28px;background:var(--bg3);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;font-size:11px;color:var(--text-dim);
  gap:6px;flex-shrink:0}
.tree-header-label{flex:1}
.tree-header-btn{cursor:pointer;padding:2px 4px;border-radius:2px}
.tree-header-btn:hover{color:var(--text);background:var(--hover)}
#tree-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:2px 0}
#tree-content::-webkit-scrollbar{width:6px}
#tree-content::-webkit-scrollbar-track{background:var(--bg2)}
#tree-content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.tree-node{display:flex;align-items:center;height:22px;cursor:pointer;
  font-size:12px;white-space:nowrap;overflow:hidden;border-radius:2px}
.tree-node:hover{background:var(--hover)}
.tree-node.tree-active{background:var(--sel)}
.tree-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--text-dim);flex-shrink:0;border-radius:2px;margin-right:1px}
.tree-toggle:hover{color:var(--text);background:rgba(255,255,255,.1)}
.tree-node-icon{margin-right:4px;font-size:12px;flex-shrink:0}
.tree-node-name{overflow:hidden;text-overflow:ellipsis;flex:1;padding-right:4px}
.tree-loading{padding:8px 12px;font-size:11px;color:var(--text-dim)}
/* サイドバー右端リサイズ */
#sidebar-resize{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0}
#sidebar-resize.hidden{display:none}
#sidebar-resize:hover,#sidebar-resize.dragging{background:var(--accent)}
/* プレビューパネル左端リサイズ */
#preview-resize{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0}
#preview-resize.hidden{display:none}
#preview-resize:hover,#preview-resize.dragging{background:var(--accent)}

/* ── TOOLBAR ── */
#toolbar{height:var(--toolbar-h);background:var(--bg3);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 6px;gap:2px;flex-shrink:0}
.tb-btn{height:28px;padding:0 8px;background:transparent;border:1px solid transparent;
  color:var(--text);cursor:pointer;border-radius:3px;font-size:12px;display:flex;
  align-items:center;gap:4px;white-space:nowrap}
.tb-btn:hover{background:var(--hover);border-color:var(--border)}
.tb-btn:active{background:var(--bg4)}
.tb-btn.active{background:var(--sel);border-color:var(--sel-border)}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.tb-btn .icon{font-size:14px}

/* ── MAIN AREA ── */
#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── PANE ── */
.pane{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:200px;
  border-right:1px solid var(--border)}
.pane:last-of-type{border-right:none}
.pane.active .tab-bar{border-bottom-color:var(--accent)}

/* TAB BAR */
.tab-bar{height:var(--tab-h);background:var(--bg3);border-bottom:2px solid var(--border);
  display:flex;align-items:flex-end;padding:0 4px;gap:2px;overflow:hidden;flex-shrink:0}
.tab{height:26px;padding:0 10px;background:var(--bg4);border:1px solid var(--border);
  border-bottom:none;border-radius:4px 4px 0 0;cursor:pointer;display:flex;align-items:center;
  gap:6px;max-width:180px;min-width:60px;font-size:12px;color:var(--text-dim)}
.tab.active{background:var(--bg2);color:var(--text-bright);border-bottom:2px solid var(--bg2)}
.tab:hover:not(.active){background:var(--hover)}
.tab-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-close{width:14px;height:14px;border-radius:2px;display:flex;align-items:center;
  justify-content:center;font-size:10px;flex-shrink:0;color:var(--text-dim)}
.tab-close:hover{background:rgba(255,255,255,.15);color:var(--text-bright)}
.tab-add{height:22px;width:22px;background:transparent;border:1px solid transparent;
  border-radius:3px;cursor:pointer;color:var(--text-dim);font-size:16px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;margin-left:2px}
.tab-add:hover{background:var(--hover);border-color:var(--border);color:var(--text)}

/* ADDRESS BAR */
.addr-bar{height:var(--addr-h);background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 6px;gap:4px;flex-shrink:0}
.addr-nav{width:22px;height:22px;background:transparent;border:none;color:var(--text-dim);
  cursor:pointer;border-radius:3px;font-size:14px;display:flex;align-items:center;justify-content:center}
.addr-nav:hover{background:var(--hover);color:var(--text)}
.addr-nav:disabled{opacity:.3;cursor:default}
.addr-crumbs{flex:1;height:22px;background:var(--bg4);border:1px solid var(--border);
  border-radius:3px;display:flex;align-items:center;overflow:hidden;cursor:text;
  padding:0 4px;min-width:0}
.crumb{padding:1px 5px;color:var(--text-dim);font-size:12px;white-space:nowrap;
  cursor:pointer;border-radius:2px;flex-shrink:0;line-height:20px}
.crumb:hover{background:var(--hover);color:var(--text)}
.crumb.crumb-active{color:var(--text)}
.crumb-sep{color:var(--text-dim);font-size:10px;opacity:.45;flex-shrink:0}
.addr-input{flex:1;height:22px;background:var(--bg4);border:1px solid var(--accent);
  color:var(--text);border-radius:3px;padding:0 6px;font-size:12px;outline:none;display:none}
.addr-input.editing{display:block}
.addr-copy{width:22px;height:22px;background:transparent;border:none;color:var(--text-dim);
  cursor:pointer;border-radius:3px;font-size:13px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;padding:0}
.addr-copy:hover{background:var(--hover);color:var(--text)}

/* FILE LIST HEADER */
.list-header{height:var(--header-h);background:var(--bg3);border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:1fr 80px 120px 60px;align-items:center;
  padding:0 4px;gap:4px;flex-shrink:0;font-size:11px;color:var(--text-dim)}
.list-header span{cursor:pointer;padding:2px 4px;border-radius:2px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.list-header span:hover{background:var(--hover);color:var(--text)}
.list-header span.sort-asc::after{content:" ▲"}
.list-header span.sort-desc::after{content:" ▼"}

/* FILE LIST */
.file-list{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.file-list::-webkit-scrollbar{width:8px}
.file-list::-webkit-scrollbar-track{background:var(--bg2)}
.file-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
.file-list::-webkit-scrollbar-thumb:hover{background:#555}

.file-row{display:grid;grid-template-columns:1fr 80px 120px 60px;align-items:center;
  height:22px;padding:0 4px;gap:4px;cursor:pointer;font-size:12px}
.file-row:hover{background:var(--hover)}
.file-row.selected{background:var(--sel)}
.file-row.selected:hover{background:var(--sel)}
.file-row .f-name{display:flex;align-items:center;gap:5px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.file-row .f-icon{font-size:13px;flex-shrink:0}
.file-row .f-name-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-row .f-size{text-align:right;color:var(--text-dim);font-size:11px}
.file-row .f-date{color:var(--text-dim);font-size:11px}
.file-row .f-ext{color:var(--text-dim);font-size:11px;text-transform:uppercase}
.file-row.is-dir .f-name-text{color:#80c8ff}
.file-row.is-dir .f-size{color:var(--text-dim);font-style:italic}

/* THUMBNAIL GRID */
:root{--thumb-col:112px}
.thumb-grid{display:grid!important;
  grid-template-columns:repeat(auto-fill,minmax(var(--thumb-col),1fr));
  gap:8px;padding:10px;overflow-y:auto;overflow-x:hidden;align-content:start}
.thumb-item{display:flex;flex-direction:column;align-items:center;padding:6px 4px 5px;
  border-radius:5px;cursor:default;user-select:none;border:1px solid transparent;min-width:0}
.thumb-item:hover{background:var(--hover);border-color:var(--border)}
.thumb-item.selected{background:var(--sel);border-color:var(--sel-border,var(--accent))}
.thumb-img-wrap{width:calc(var(--thumb-col) - 22px);height:calc((var(--thumb-col) - 22px) * 0.75);
  display:flex;align-items:center;justify-content:center;position:relative;
  overflow:hidden;border-radius:3px;background:var(--bg3);flex-shrink:0}
.thumb-img-wrap img,.thumb-img-wrap video{max-width:100%;max-height:100%;
  object-fit:contain;display:block}
.thumb-img-wrap video{cursor:pointer}
.vid-badge{position:absolute;bottom:3px;right:3px;font-size:9px;line-height:1;
  background:rgba(0,0,0,.55);color:#fff;border-radius:2px;padding:1px 4px;
  pointer-events:none;letter-spacing:.3px}
.thumb-item:hover .vid-badge{background:rgba(var(--accent-rgb,99,102,241),.8)}
.thumb-icon-lg{font-size:calc((var(--thumb-col) - 22px) * 0.42);line-height:1;user-select:none}
.thumb-label{font-size:11px;color:var(--text);text-align:center;width:100%;margin-top:5px;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  word-break:break-all;line-height:1.3}
.thumb-item.is-dir .thumb-label{color:#80c8ff}
/* サイズスライダー */
#thumb-size-ctrl{display:flex;align-items:center;gap:5px;margin-left:2px}
#thumb-size-ctrl input[type=range]{width:90px;accent-color:var(--accent);cursor:pointer;
  appearance:none;-webkit-appearance:none;height:18px;background:transparent;outline:none}
#thumb-size-ctrl input[type=range]::-webkit-slider-runnable-track{
  height:3px;background:var(--border);border-radius:2px}
#thumb-size-ctrl input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--accent);cursor:pointer;margin-top:-5px}
#thumb-size-ctrl input[type=range]::-moz-range-track{
  height:3px;background:var(--border);border-radius:2px}
#thumb-size-ctrl input[type=range]::-moz-range-thumb{
  width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
#thumb-size-ctrl .sz-icon{font-size:13px;color:var(--text-dim);user-select:none;line-height:1;
  opacity:.7}

/* RESIZE DIVIDER */
#divider{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;
  position:relative;z-index:10}
#divider:hover,#divider.dragging{background:var(--accent)}

/* PREVIEW PANEL */
#preview-panel{width:320px;background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#preview-panel.hidden{display:none}
#preview-panel .preview-header{height:28px;background:var(--bg3);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;font-size:11px;color:var(--text-dim);
  justify-content:space-between}
#preview-panel .preview-close{cursor:pointer;color:var(--text-dim)}
#preview-panel .preview-close:hover{color:var(--text)}
#preview-content{flex:1;overflow:auto;padding:10px}
#preview-content img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}
#preview-content.img-mode{display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:0}
#preview-content.img-mode img{max-width:100%;max-height:100%;object-fit:contain;margin:0}
#preview-content pre{font-family:"Cascadia Code","Fira Code","Consolas",monospace;
  font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-all;
  color:#9cdcfe}
.preview-empty{display:flex;align-items:center;justify-content:center;height:100%;
  color:var(--text-dim);font-size:13px;text-align:center}
.preview-binary{padding:20px;text-align:center;color:var(--text-dim)}
.preview-binary .big-icon{font-size:48px;display:block;margin-bottom:12px}

/* 動画 */
.preview-video{padding:10px;text-align:center;height:100%;display:flex;align-items:center;justify-content:center}
.preview-video video{max-width:100%;max-height:280px;border-radius:4px;background:#000;outline:none}
/* 音声 */
.preview-audio{padding:24px 16px;text-align:center}
.preview-audio .big-icon{font-size:52px;display:block;margin-bottom:12px}
.preview-audio audio{width:100%;margin-top:8px}
/* PDF */
#preview-content.pdf-mode{padding:0;overflow:hidden;display:flex;flex-direction:column}
.pdf-scroll{flex:1;overflow-y:auto;background:#525659;padding:10px;min-height:0;
  display:flex;flex-direction:column;gap:8px;align-items:center}
.pdf-scroll canvas{display:block;box-shadow:0 2px 8px rgba(0,0,0,.5);max-width:100%}
.pdf-toolbar{height:28px;display:flex;align-items:center;gap:10px;padding:0 10px;
  background:var(--bg3);border-top:1px solid var(--border);font-size:11px;flex-shrink:0}
.pdf-toolbar a{color:var(--accent);text-decoration:none}
.pdf-toolbar a:hover{text-decoration:underline}
/* CSV テーブル */
.preview-csv{overflow:auto;height:100%}
.preview-csv table{border-collapse:collapse;font-size:11px}
.preview-csv th{background:var(--bg3);padding:3px 8px;border:1px solid var(--border);
  position:sticky;top:0;z-index:1;color:var(--text-bright);text-align:left;white-space:nowrap}
.preview-csv td{padding:2px 8px;border:1px solid var(--border);white-space:nowrap;
  max-width:180px;overflow:hidden;text-overflow:ellipsis}
.preview-csv tr:hover td{background:var(--hover)}
.preview-csv .csv-row-num{color:var(--text-dim);background:var(--bg3);user-select:none;
  position:sticky;left:0;border-right:2px solid var(--border)}
/* アーカイブ */
.preview-archive{overflow-y:auto;height:100%}
.preview-archive-hdr{display:grid;grid-template-columns:1fr 70px;padding:3px 10px;
  background:var(--bg3);border-bottom:1px solid var(--border);font-size:11px;
  color:var(--text-dim);position:sticky;top:0;z-index:1}
.preview-archive-row{display:grid;grid-template-columns:1fr 70px;padding:2px 10px;
  border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.preview-archive-row:hover{background:var(--hover)}
.arc-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arc-name.is-dir{color:#80c8ff}
.arc-size{color:var(--text-dim);text-align:right}
/* メタ情報パネル */
#preview-meta{border-top:1px solid var(--border);background:var(--bg3);
  overflow-y:auto;flex-shrink:0;display:none;max-height:220px}
#preview-meta.visible{display:block}
.meta-rows{padding:2px 0}
.meta-row{display:flex;padding:3px 10px;font-size:11px;gap:6px;border-bottom:1px solid rgba(255,255,255,.04)}
.meta-label{color:var(--text-dim);width:80px;flex-shrink:0;text-align:right}
.meta-value{color:var(--text);word-break:break-all;flex:1}
.btn-meta{cursor:pointer;padding:0 7px;height:20px;border-radius:3px;font-size:11px;
  color:var(--text-dim);background:transparent;border:1px solid transparent;line-height:1}
.btn-meta:hover{background:var(--hover);border-color:var(--border);color:var(--text)}
.btn-meta.active{background:var(--sel);border-color:var(--sel-border);color:var(--text-bright)}

/* SEARCH BAR */
#search-bar{background:var(--bg3);border-bottom:1px solid var(--border);
  padding:6px 8px;display:none;flex-shrink:0}
#search-bar.visible{display:flex;gap:6px;align-items:center}
#search-input{flex:1;height:26px;background:var(--bg4);border:1px solid var(--border);
  color:var(--text);border-radius:3px;padding:0 8px;font-size:12px;outline:none}
#search-input:focus{border-color:var(--accent)}
#search-close{background:transparent;border:none;color:var(--text-dim);cursor:pointer;
  font-size:16px}
#search-close:hover{color:var(--text)}
#search-results-info{font-size:11px;color:var(--text-dim);white-space:nowrap}

/* STATUS BAR */
#status{height:var(--status-h);background:var(--bg3);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:16px;font-size:11px;color:var(--text-dim);
  flex-shrink:0}
#status-left{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#status-right{white-space:nowrap}

/* CONTEXT MENU */
#ctx-menu{position:fixed;background:var(--bg3);border:1px solid var(--border);
  border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.6);z-index:1000;
  padding:4px 0;min-width:160px;display:none}
#ctx-menu.visible{display:block}
.ctx-item{padding:6px 16px;cursor:pointer;font-size:12px;display:flex;
  align-items:center;gap:8px}
.ctx-item:hover{background:var(--sel)}
.ctx-item.danger{color:#f87171}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}
.ctx-item .ctx-key{margin-left:auto;color:var(--text-dim);font-size:10px}

/* MODAL DIALOG */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;
  display:none;align-items:center;justify-content:center}
#modal-overlay.visible{display:flex}
#modal{background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:20px;min-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.8)}
#modal h3{margin-bottom:12px;font-size:14px;color:var(--text-bright)}
#modal input{width:100%;height:30px;background:var(--bg4);border:1px solid var(--border);
  color:var(--text);border-radius:3px;padding:0 8px;font-size:13px;outline:none;margin-bottom:14px}
#modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn{height:28px;padding:0 16px;border-radius:3px;cursor:pointer;font-size:12px;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-default{background:var(--bg4);color:var(--text);border:1px solid var(--border)}
.btn-default:hover{background:var(--hover)}
.btn-danger{background:#b91c1c;color:#fff}
.btn-danger:hover{background:#991b1b}

/* LOADING */
.loading-row{padding:20px;text-align:center;color:var(--text-dim);font-size:12px}
.error-row{padding:20px;text-align:center;color:#f87171;font-size:12px}

/* ── RENAMER ── */
#renamer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:3000;
  display:none;align-items:center;justify-content:center}
#renamer-overlay.visible{display:flex}
#renamer{background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  width:min(940px,96vw);height:min(640px,88vh);display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,.85);overflow:hidden}
#renamer-hdr{height:38px;background:var(--bg4);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;font-size:13px;font-weight:600;
  flex-shrink:0;gap:8px;border-radius:6px 6px 0 0}
.ren-hdr-close{margin-left:auto;cursor:pointer;color:var(--text-dim);font-size:16px;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:3px}
.ren-hdr-close:hover{background:var(--hover);color:var(--text)}
#renamer-body{flex:1;display:flex;min-height:0}
/* left: modes + options */
#renamer-left{width:252px;flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.ren-modes{padding:6px;display:flex;flex-direction:column;gap:1px;
  border-bottom:1px solid var(--border);flex-shrink:0}
.ren-mode-btn{padding:6px 10px;border-radius:3px;cursor:pointer;font-size:12px;
  color:var(--text-dim);background:transparent;text-align:left;border:none;width:100%;
  display:flex;align-items:center;gap:7px}
.ren-mode-btn:hover{background:var(--hover);color:var(--text)}
.ren-mode-btn.active{background:var(--sel);color:var(--text-bright)}
.ren-mode-icon{font-size:13px;flex-shrink:0}
.ren-opts{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:0}
.ren-panel{display:none;flex-direction:column;gap:10px}
.ren-panel.active{display:flex}
.ren-field{display:flex;flex-direction:column;gap:3px}
.ren-field>label{font-size:10px;color:var(--text-dim);text-transform:uppercase;
  letter-spacing:.05em;font-weight:600}
.ren-field input[type=text],.ren-field input[type=number],.ren-field select{
  height:28px;background:var(--bg4);border:1px solid var(--border);color:var(--text);
  border-radius:3px;padding:0 8px;font-size:12px;outline:none;width:100%}
.ren-field input:focus,.ren-field select:focus{border-color:var(--accent)}
.ren-checks,.ren-radios{display:flex;flex-direction:column;gap:5px}
.ren-checks label,.ren-radios label{display:flex;align-items:center;gap:7px;
  font-size:12px;cursor:pointer;color:var(--text);padding:2px 0}
.ren-checks input,.ren-radios input{accent-color:var(--accent);flex-shrink:0}
.ren-sep{height:1px;background:var(--border);margin:8px 0}
/* right: preview */
#renamer-right{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#ren-prev-hdr{height:26px;background:var(--bg3);border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:1fr 18px 1fr 30px;align-items:center;
  padding:0 10px;font-size:10px;color:var(--text-dim);text-transform:uppercase;
  letter-spacing:.05em;flex-shrink:0;gap:4px;font-weight:600}
#ren-prev-list{flex:1;overflow-y:auto}
#ren-prev-list::-webkit-scrollbar{width:6px}
#ren-prev-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.ren-prow{display:grid;grid-template-columns:1fr 18px 1fr 30px;align-items:center;
  height:24px;padding:0 10px;font-size:12px;gap:4px;
  border-bottom:1px solid rgba(255,255,255,.04)}
.ren-prow:hover{background:var(--hover)}
.rp-old{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim)}
.ren-prow.changed .rp-old{color:var(--text)}
.rp-arr{color:var(--text-dim);font-size:10px;text-align:center}
.rp-new{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim)}
.ren-prow.changed .rp-new{color:#4ade80}
.ren-prow.conflict .rp-new,.ren-prow.error .rp-new{color:#f87171}
.rp-st{font-size:11px;text-align:center;color:var(--text-dim)}
.ren-prow.changed .rp-st{color:#4ade80}
.ren-prow.conflict .rp-st,.ren-prow.error .rp-st{color:#f87171}
/* footer */
#renamer-ftr{height:42px;border-top:1px solid var(--border);display:flex;
  align-items:center;padding:0 12px;gap:8px;flex-shrink:0;background:var(--bg3)}
#ren-ftr-st{flex:1;font-size:11px;color:var(--text-dim)}

/* SEARCH RESULTS PANEL */
#search-results-panel{flex:1;overflow:hidden;display:none;flex-direction:column}
#search-results-panel.visible{display:flex}
#search-results-header{height:var(--header-h);background:var(--bg3);border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:1fr 200px 80px 60px;align-items:center;
  padding:0 4px;gap:4px;flex-shrink:0;font-size:11px;color:var(--text-dim)}
#search-results-list{flex:1;overflow-y:auto;background:var(--bg)}
.search-row{display:grid;grid-template-columns:1fr 200px 80px 60px;align-items:center;
  height:22px;padding:0 4px;gap:4px;cursor:pointer;font-size:12px}
.search-row:hover{background:var(--hover)}
.search-row.selected{background:var(--sel)}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tb-btn" onclick="FM.navBack()" id="btn-back" title="戻る (Alt+←)">
    <span class="icon">◀</span>
  </button>
  <button class="tb-btn" onclick="FM.navForward()" id="btn-fwd" title="進む (Alt+→)">
    <span class="icon">▶</span>
  </button>
  <button class="tb-btn" onclick="FM.navUp()" title="上へ (Backspace)">
    <span class="icon">↑</span> 上へ
  </button>
  <button class="tb-btn" onclick="FM.refresh()" title="更新 (F5)">
    <span class="icon">↺</span> 更新
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="FM.promptNewFolder()" title="新規フォルダ">
    <span class="icon">📁</span> 新規フォルダ
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="FM.copySelected()" title="コピー (F5)">
    <span class="icon">⧉</span> コピー
  </button>
  <button class="tb-btn" onclick="FM.moveSelected()" title="移動 (F6)">
    <span class="icon">⇄</span> 移動
  </button>
  <button class="tb-btn" onclick="FM.deleteSelected()" title="削除 (Del)">
    <span class="icon">🗑</span> 削除
  </button>
  <button class="tb-btn" onclick="Renamer.open()" title="バッチリネーマー (Shift+F2)">
    <span class="icon">🏷</span> リネーム
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="FM.toggleSearch()" id="btn-search" title="検索 (Ctrl+F)">
    <span class="icon">🔍</span> 検索
  </button>
  <button class="tb-btn" onclick="FM.togglePreview()" id="btn-preview" title="プレビュー (F3)">
    <span class="icon">👁</span> プレビュー
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="FM.openHome()" title="ホームフォルダ">
    <span class="icon">🏠</span>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="Tree.toggle()" id="btn-tree" title="フォルダツリー (Ctrl+T)">
    <span class="icon">🌳</span> ツリー
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="FM.toggleView()" id="btn-view" title="サムネイル表示 (V)">
    <span class="icon">⊞</span> サムネイル
  </button>
  <div id="thumb-size-ctrl" class="hidden">
    <span class="sz-icon">⊟</span>
    <input type="range" id="thumb-slider" min="60" max="220" step="4" value="112"
      oninput="FM.applyThumbSize(+this.value)" title="サムネイルサイズ">
    <span class="sz-icon">⊞</span>
  </div>
</div>

<!-- SEARCH BAR -->
<div id="search-bar">
  <span style="color:var(--text-dim);font-size:12px">検索:</span>
  <input type="text" id="search-input" placeholder="ファイル名を入力...">
  <span id="search-results-info"></span>
  <button id="search-close" onclick="FM.toggleSearch()">✕</button>
</div>

<!-- MAIN AREA -->
<div id="main">
  <!-- SIDEBAR (お気に入り + ツリー) -->
  <div id="sidebar" class="hidden">
    <!-- お気に入り -->
    <div id="fav-panel">
      <div class="panel-header">
        <span class="panel-header-label">★ お気に入り</span>
        <button class="panel-header-btn" onclick="Favs.addCurrent()" title="現在のフォルダを追加">＋ 追加</button>
      </div>
      <div id="fav-list"></div>
    </div>
    <!-- お気に入り/ツリー 水平リサイズ -->
    <div id="fav-resize" title="ドラッグしてサイズ変更"></div>
    <!-- フォルダツリー -->
    <div id="tree-inner">
      <div class="tree-header">
        <span class="tree-header-label">📂 フォルダツリー</span>
        <span class="tree-header-btn" onclick="Tree.refresh()" title="更新">↺</span>
        <span class="tree-header-btn" onclick="Tree.toggle()" title="閉じる">✕</span>
      </div>
      <div id="tree-content"><div class="tree-loading">読み込み中...</div></div>
    </div>
  </div>
  <div id="sidebar-resize" class="hidden"></div>
  <!-- LEFT PANE -->
  <div class="pane active" id="pane-left" onclick="FM.setActive('left')">
    <div class="tab-bar" id="tabs-left"></div>
    <div class="addr-bar">
      <button class="addr-nav" id="back-left" onclick="event.stopPropagation();FM.navBack('left')" title="戻る">◀</button>
      <button class="addr-nav" id="fwd-left" onclick="event.stopPropagation();FM.navForward('left')" title="進む">▶</button>
      <button class="addr-nav" onclick="event.stopPropagation();FM.navUp('left')" title="上へ">↑</button>
      <div class="addr-crumbs" id="crumbs-left"
        onclick="event.stopPropagation();FM.handleCrumbClick(event,'left')"
        ondblclick="event.stopPropagation();FM.crumbStartEdit('left')"
        title="クリック: 移動 / ダブルクリック: 編集"></div>
      <input class="addr-input" id="addr-left" type="text"
        onkeydown="FM.handleAddrKey(event,'left')"
        onblur="FM.crumbEndEdit('left')"
        onclick="event.stopPropagation()">
      <button class="addr-copy" onclick="event.stopPropagation();FM.copyPath('left')" title="パスをコピー">⧉</button>
    </div>
    <div class="list-header" id="header-left">
      <span data-sort="name">名前</span>
      <span data-sort="size">サイズ</span>
      <span data-sort="modified">更新日時</span>
      <span data-sort="ext">種類</span>
    </div>
    <div class="file-list" id="list-left" tabindex="0"></div>
  </div>

  <!-- DIVIDER -->
  <div id="divider"></div>

  <!-- RIGHT PANE -->
  <div class="pane" id="pane-right" onclick="FM.setActive('right')">
    <div class="tab-bar" id="tabs-right"></div>
    <div class="addr-bar">
      <button class="addr-nav" id="back-right" onclick="event.stopPropagation();FM.navBack('right')" title="戻る">◀</button>
      <button class="addr-nav" id="fwd-right" onclick="event.stopPropagation();FM.navForward('right')" title="進む">▶</button>
      <button class="addr-nav" onclick="event.stopPropagation();FM.navUp('right')" title="上へ">↑</button>
      <div class="addr-crumbs" id="crumbs-right"
        onclick="event.stopPropagation();FM.handleCrumbClick(event,'right')"
        ondblclick="event.stopPropagation();FM.crumbStartEdit('right')"
        title="クリック: 移動 / ダブルクリック: 編集"></div>
      <input class="addr-input" id="addr-right" type="text"
        onkeydown="FM.handleAddrKey(event,'right')"
        onblur="FM.crumbEndEdit('right')"
        onclick="event.stopPropagation()">
      <button class="addr-copy" onclick="event.stopPropagation();FM.copyPath('right')" title="パスをコピー">⧉</button>
    </div>
    <div class="list-header" id="header-right">
      <span data-sort="name">名前</span>
      <span data-sort="size">サイズ</span>
      <span data-sort="modified">更新日時</span>
      <span data-sort="ext">種類</span>
    </div>
    <div class="file-list" id="list-right" tabindex="0"></div>
  </div>

  <!-- プレビューリサイズハンドル -->
  <div id="preview-resize" class="hidden"></div>
  <!-- PREVIEW PANEL -->
  <div id="preview-panel" class="hidden">
    <div class="preview-header">
      <span id="preview-title" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">プレビュー</span>
      <button class="btn-meta" id="btn-meta" onclick="FM.toggleMeta()" title="メタ情報 (I)">ℹ</button>
      <span class="preview-close" onclick="FM.togglePreview()" style="margin-left:4px">✕</span>
    </div>
    <div id="preview-content"><div class="preview-empty">ファイルを選択してください</div></div>
    <div id="preview-meta"></div>
  </div>
</div>

<!-- STATUS BAR -->
<div id="status">
  <div id="status-left">準備完了</div>
  <div id="status-right"></div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="FM.ctxOpen()">🔍 開く</div>
  <div class="ctx-item" onclick="FM.ctxOpenOther()">↗ 反対側で開く</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="FM.copySelected()">⧉ コピー <span class="ctx-key">F5</span></div>
  <div class="ctx-item" onclick="FM.moveSelected()">⇄ 移動 <span class="ctx-key">F6</span></div>
  <div class="ctx-item" onclick="FM.promptRename()">✏ 名前変更 <span class="ctx-key">F2</span></div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="FM.promptNewFolder()">📁 新規フォルダ</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="FM.deleteSelected()">🗑 削除 <span class="ctx-key">Del</span></div>
</div>

<!-- RENAMER -->
<div id="renamer-overlay">
  <div id="renamer">
    <div id="renamer-hdr">
      <span>🏷 バッチリネーマー</span>
      <span id="ren-hdr-count"></span>
      <span class="ren-hdr-close" onclick="Renamer.close()">✕</span>
    </div>
    <div id="renamer-body">
      <!-- LEFT: モード + オプション -->
      <div id="renamer-left">
        <div class="ren-modes">
          <button class="ren-mode-btn active" data-mode="replace" onclick="Renamer.setMode('replace')">
            <span class="ren-mode-icon">🔍</span>検索 / 置換
          </button>
          <button class="ren-mode-btn" data-mode="number" onclick="Renamer.setMode('number')">
            <span class="ren-mode-icon">🔢</span>連番付加
          </button>
          <button class="ren-mode-btn" data-mode="affix" onclick="Renamer.setMode('affix')">
            <span class="ren-mode-icon">↔</span>前後追加
          </button>
          <button class="ren-mode-btn" data-mode="case" onclick="Renamer.setMode('case')">
            <span class="ren-mode-icon">Aa</span>大文字 / 小文字
          </button>
          <button class="ren-mode-btn" data-mode="ext" onclick="Renamer.setMode('ext')">
            <span class="ren-mode-icon">📎</span>拡張子変更
          </button>
          <button class="ren-mode-btn" data-mode="remove" onclick="Renamer.setMode('remove')">
            <span class="ren-mode-icon">✂</span>文字削除
          </button>
        </div>
        <div class="ren-opts" id="ren-opts">
          <!-- 検索/置換 -->
          <div class="ren-panel active" id="ren-panel-replace">
            <div class="ren-field">
              <label>検索</label>
              <input type="text" id="ren-find" placeholder="検索するテキスト...">
            </div>
            <div class="ren-field">
              <label>置換</label>
              <input type="text" id="ren-repl" placeholder="置換後のテキスト（空=削除）">
            </div>
            <div class="ren-sep"></div>
            <div class="ren-checks">
              <label><input type="checkbox" id="ren-regex"> 正規表現を使用</label>
              <label><input type="checkbox" id="ren-casesen"> 大文字/小文字を区別</label>
            </div>
          </div>
          <!-- 連番 -->
          <div class="ren-panel" id="ren-panel-number">
            <div class="ren-field">
              <label>挿入位置</label>
              <select id="ren-num-pos">
                <option value="prefix">先頭に追加</option>
                <option value="suffix">末尾に追加</option>
              </select>
            </div>
            <div class="ren-field">
              <label>区切り文字</label>
              <input type="text" id="ren-num-sep" value="_">
            </div>
            <div class="ren-field">
              <label>開始番号</label>
              <input type="number" id="ren-num-start" value="1" min="0">
            </div>
            <div class="ren-field">
              <label>ステップ</label>
              <input type="number" id="ren-num-step" value="1" min="1">
            </div>
            <div class="ren-field">
              <label>桁数（0埋め）</label>
              <input type="number" id="ren-num-digits" value="2" min="1" max="8">
            </div>
          </div>
          <!-- 前後追加 -->
          <div class="ren-panel" id="ren-panel-affix">
            <div class="ren-field">
              <label>プレフィックス（先頭に追加）</label>
              <input type="text" id="ren-prefix" placeholder="先頭に付加するテキスト">
            </div>
            <div class="ren-field">
              <label>サフィックス（末尾に追加）</label>
              <input type="text" id="ren-suffix" placeholder="末尾に付加するテキスト">
            </div>
          </div>
          <!-- 大文字/小文字 -->
          <div class="ren-panel" id="ren-panel-case">
            <div class="ren-radios">
              <label><input type="radio" name="ren-case" value="upper"> UPPERCASE（すべて大文字）</label>
              <label><input type="radio" name="ren-case" value="lower" checked> lowercase（すべて小文字）</label>
              <label><input type="radio" name="ren-case" value="title"> Title Case（語頭大文字）</label>
              <label><input type="radio" name="ren-case" value="sentence"> Sentence case（文頭大文字）</label>
            </div>
            <div class="ren-sep"></div>
            <div class="ren-checks">
              <label><input type="checkbox" id="ren-case-ext"> 拡張子にも適用</label>
            </div>
          </div>
          <!-- 拡張子変更 -->
          <div class="ren-panel" id="ren-panel-ext">
            <div class="ren-field">
              <label>新しい拡張子</label>
              <input type="text" id="ren-new-ext" placeholder=".png">
            </div>
          </div>
          <!-- 文字削除 -->
          <div class="ren-panel" id="ren-panel-remove">
            <div class="ren-field">
              <label>先頭から N 文字削除</label>
              <input type="number" id="ren-rm-front" value="0" min="0">
            </div>
            <div class="ren-field">
              <label>末尾から N 文字削除</label>
              <input type="number" id="ren-rm-back" value="0" min="0">
            </div>
          </div>
          <!-- 共通 -->
          <div class="ren-sep" id="ren-apply-sep"></div>
          <div class="ren-field" id="ren-apply-field">
            <label>適用対象</label>
            <select id="ren-apply-to">
              <option value="name">ファイル名のみ（拡張子除く）</option>
              <option value="ext">拡張子のみ</option>
              <option value="both">ファイル名 + 拡張子</option>
            </select>
          </div>
        </div>
      </div>
      <!-- RIGHT: プレビュー -->
      <div id="renamer-right">
        <div id="ren-prev-hdr">
          <span>変更前</span><span></span><span>変更後</span><span style="text-align:center">状態</span>
        </div>
        <div id="ren-prev-list"></div>
      </div>
    </div>
    <div id="renamer-ftr">
      <span id="ren-ftr-st"></span>
      <button class="btn btn-default" onclick="Renamer.close()">キャンセル</button>
      <button class="btn btn-primary" id="ren-apply-btn" onclick="Renamer.apply()">リネーム実行</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">フォルダ名を入力</h3>
    <input type="text" id="modal-input" autocomplete="off">
    <div class="modal-btns">
      <button class="btn btn-default" onclick="FM.closeModal()">キャンセル</button>
      <button class="btn btn-primary" id="modal-ok" onclick="FM.modalConfirm()">OK</button>
    </div>
  </div>
</div>

<script>
// ─────────────────── API ────────────────────────────────────────────────────
const API = {
  async call(url, opts={}) {
    const res = await fetch(url, opts);
    if (!res.ok) {
      let msg;
      try { msg = (await res.json()).detail; } catch { msg = await res.text(); }
      throw new Error(msg || `HTTP ${res.status}`);
    }
    return res.json();
  },
  listFiles: (path) => API.call(`/files?path=${enc(path)}`),
  getTree:   (path) => API.call(`/tree?path=${enc(path)}`),
  copy:  (src,dst) => API.call('/copy',  {method:'POST', headers:json, body:JSON.stringify({src,dst})}),
  move:  (src,dst) => API.call('/move',  {method:'POST', headers:json, body:JSON.stringify({src,dst})}),
  del:   (path)    => API.call('/delete',{method:'DELETE',headers:json, body:JSON.stringify({path})}),
  preview:(path)   => API.call(`/preview?path=${enc(path)}`),
  search:(q,path)  => API.call(`/search?q=${enc(q)}&path=${enc(path)}`),
  mkdir: (path)    => API.call('/mkdir', {method:'POST', headers:json, body:JSON.stringify({path})}),
  rename:(src,dst) => API.call('/rename',{method:'POST', headers:json, body:JSON.stringify({src,dst})}),
  meta:  (path)    => API.call(`/meta?path=${enc(path)}`),
};
const enc = encodeURIComponent;

// ─────────────────── UTILS ──────────────────────────────────────────────────
function fmtSize(n) {
  if (n < 0) return '';
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  if (n < 1024**3) return (n/1024/1024).toFixed(1) + ' MB';
  return (n/1024**3).toFixed(2) + ' GB';
}
function fmtDate(ts) {
  const d = new Date(ts * 1000);
  const now = Date.now();
  const diff = now - d.getTime();
  if (diff < 86400000) return d.toLocaleTimeString('ja',{hour:'2-digit',minute:'2-digit'});
  if (diff < 365*86400000) return (d.getMonth()+1)+'/'+d.getDate();
  return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
}
function fileIcon(item) {
  if (item.is_dir) return '📁';
  const e = (item.ext||'').toLowerCase();
  const map = {
    '.png':' 🖼','.jpg':'🖼','.jpeg':'🖼','.gif':'🖼','.webp':'🖼','.svg':'🖼','.ico':'🖼','.bmp':'🖼',
    '.mp4':'🎬','.mov':'🎬','.avi':'🎬','.mkv':'🎬','.webm':'🎬',
    '.mp3':'🎵','.wav':'🎵','.flac':'🎵','.aac':'🎵','.m4a':'🎵','.ogg':'🎵',
    '.pdf':'📕','.doc':'📘','.docx':'📘','.xls':'📗','.xlsx':'📗','.ppt':'📙','.pptx':'📙',
    '.zip':'📦','.tar':'📦','.gz':'📦','.bz2':'📦','.7z':'📦','.rar':'📦','.dmg':'📦',
    '.py':'🐍','.js':'💛','.ts':'💙','.jsx':'💛','.tsx':'💙','.html':'🌐','.css':'🎨',
    '.json':'📋','.yaml':'📋','.yml':'📋','.toml':'📋','.xml':'📋',
    '.sh':'⚙','.bash':'⚙','.zsh':'⚙','.bat':'⚙','.cmd':'⚙',
    '.md':'📝','.txt':'📄','.log':'📄','.csv':'📊',
    '.exe':'⚙','.app':'⚙','.deb':'⚙','.rpm':'⚙',

    '.sql':'🗄','.db':'🗄','.sqlite':'🗄',

  };
  return map[e] || '📄';
}

// path join helper
function pathJoin(a, b) {
  const sep = a.includes('/') ? '/' : '\\';
  return a.replace(/[/\\]+$/, '') + sep + b;
}
function pathBasename(p) {
  return p.replace(/.*[/\\]/, '') || p;
}
// PDF.js を使って PDF を canvas にレンダリング
async function renderPDF(url, size, container, capturedPath) {
  const showFallback = (msg) => {
    if (ST.lastPreviewPath !== capturedPath) return;
    container.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
          height:100%;gap:12px;padding:20px;text-align:center">
        <div style="font-size:40px">📕</div>
        <div style="color:var(--text-dim);font-size:12px">${esc(msg)}</div>
        <a href="${url}" target="_blank" style="color:var(--accent);font-size:12px;text-decoration:none">↗ 新しいタブで開く</a>
        <a href="${url}" download style="color:var(--accent);font-size:12px;text-decoration:none">⬇ ダウンロード</a>
      </div>`;
  };
  try {
    // PDF.js を CDN から動的ロード（1 回のみ）
    if (!window.pdfjsLib) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload = res; s.onerror = () => rej(new Error('PDF.js の読み込みに失敗しました'));
        document.head.appendChild(s);
      });
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    if (ST.lastPreviewPath !== capturedPath) return;

    const pdf = await window.pdfjsLib.getDocument(url).promise;
    if (ST.lastPreviewPath !== capturedPath) return;

    // UI を構築
    const outer = document.createElement('div');
    outer.style.cssText = 'display:flex;flex-direction:column;height:100%';
    const scroll = document.createElement('div');
    scroll.className = 'pdf-scroll';
    const bar = document.createElement('div');
    bar.className = 'pdf-toolbar';
    bar.innerHTML = `
      <a href="${url}" target="_blank">↗ 新しいタブで開く</a>
      <a href="${url}" download>⬇ ダウンロード</a>
      <span style="color:var(--text-dim)">${pdf.numPages} ページ</span>
      <span style="margin-left:auto;color:var(--text-dim)">${fmtSize(size)}</span>`;
    outer.appendChild(scroll);
    outer.appendChild(bar);
    container.innerHTML = '';
    container.appendChild(outer);

    // 全ページをキャンバスにレンダリング
    const availW = Math.max(100, scroll.clientWidth - 24);
    for (let i = 1; i <= pdf.numPages; i++) {
      if (ST.lastPreviewPath !== capturedPath) return;
      const page = await pdf.getPage(i);
      const baseVp = page.getViewport({ scale: 1 });
      const scale  = availW / baseVp.width;
      const vp     = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width  = vp.width;
      canvas.height = vp.height;
      scroll.appendChild(canvas);
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    }
  } catch (err) {
    showFallback(err.message || 'PDF を表示できません');
  }
}

function setupLazyVideos(container) {
  const videos = container.querySelectorAll('video[data-src]');
  if (!videos.length) return;
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const v = e.target;
      if (!v.src) v.src = v.dataset.src;
      obs.unobserve(v);
    });
  }, { rootMargin: '120px' });
  videos.forEach(v => obs.observe(v));
}

function videoThumbError(el) {
  el.style.display = 'none';
  const span = document.createElement('span');
  span.className = 'thumb-icon-lg';
  span.textContent = el.dataset.icon || '🎬';
  el.parentNode.appendChild(span);
}

function parsePath(path) {
  if (!path) return [];
  const segments = [];
  // Unix absolute path
  if (path.startsWith('/')) {
    segments.push({ label: '/', path: '/' });
    const parts = path.split('/').filter(Boolean);
    let built = '';
    for (const part of parts) {
      built += '/' + part;
      segments.push({ label: part, path: built });
    }
  } else {
    // Windows-style or relative fallback
    const parts = path.replace(/\\/g, '/').split('/').filter(Boolean);
    let built = '';
    for (const part of parts) {
      built = built ? built + '/' + part : part;
      segments.push({ label: part, path: built });
    }
  }
  return segments;
}

}

// ─────────────────── LAYOUT PERSISTENCE ─────────────────────────────────────
const Layout = {
  KEY: 'fm-layout',

  save() {
    const sidebar  = document.getElementById('sidebar');
    const favPanel = document.getElementById('fav-panel');
    const paneLeft = document.getElementById('pane-left');
    const preview  = document.getElementById('preview-panel');
    try {
      const savePaneTabs = (side) => {
