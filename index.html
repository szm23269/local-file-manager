          viewMode: p.viewMode || 'list',
          cur: p.cur,
          tabs: p.tabs.map(t => ({path: t.path, sortBy: t.sortBy, sortDir: t.sortDir})),
        };
      };
      localStorage.setItem(this.KEY, JSON.stringify({
        sidebarVisible: Tree.visible,
        sidebarWidth  : sidebar  ? Math.round(sidebar.getBoundingClientRect().width)   : 220,
        favHeight     : favPanel ? Math.round(favPanel.getBoundingClientRect().height) : null,
        paneLeftWidth : paneLeft && paneLeft.style.width
                          ? Math.round(parseFloat(paneLeft.style.width)) : null,
        previewVisible: ST.preview,
        previewWidth  : preview  ? Math.round(preview.getBoundingClientRect().width)   : 320,
        showMeta      : ST.showMeta,
        activeSide    : ST.active,
        thumbSize     : ST.thumbSize,
        panes         : {left: savePaneTabs('left'), right: savePaneTabs('right')},
      }));
    } catch {}
  },

  load() {
    try {
      const s = localStorage.getItem(this.KEY);
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  },
};

// ─────────────────── RENDER ─────────────────────────────────────────────────
const FM = {

  // ── Initialise ──────────────────────────────────────────────────────────
  init() {
    // ペイン状態を loadDir より先に復元
    const lay = Layout.load();
    ['left', 'right'].forEach(side => {
      const saved = lay?.panes?.[side];
      if (!saved) return;
      const pane = ST.panes[side];
      pane.viewMode = saved.viewMode || 'list';
      if (Array.isArray(saved.tabs) && saved.tabs.length) {
        pane.tabs = saved.tabs.map(t => {
          const tab = makeTab(t.path || '');
          tab.sortBy  = t.sortBy  || 'name';
          tab.sortDir = t.sortDir || 1;
          return tab;
        });
        pane.cur = Math.min(saved.cur || 0, pane.tabs.length - 1);
      }
    });

    // 各ペインのカレントタブをロード
    this.loadDir('left',  activeTab('left'));
    this.loadDir('right', activeTab('right'));

    this.setupDivider();
    this.setupKeyboard();
    this.setupListeners();
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key==='Enter') this.runSearch();
      if (e.key==='Escape') this.toggleSearch();
    });
    // column header sort
    ['left','right'].forEach(side => {
      document.getElementById('header-'+side).querySelectorAll('span').forEach(s => {
        s.addEventListener('click', e => {
          e.stopPropagation();
          const tab = activeTab(side);
          const key = s.dataset.sort;
          if (tab.sortBy===key) tab.sortDir *= -1;
          else { tab.sortBy=key; tab.sortDir=1; }
          this.renderList(side);
          Layout.save();
        });
      });
    });
    this._restoreLayout();
    window.addEventListener('beforeunload', () => Layout.save());
  },

  _restoreLayout() {
    const lay = Layout.load();
    if (!lay) return;

    // サイドバー（ツリー＋お気に入り）
    if (lay.sidebarVisible) {
      Tree.toggle(); // hidden 解除 + Tree.init() 非同期呼び出し
      // ツリー init 完了前でも style.width は維持される
      if (lay.sidebarWidth) {
        const sidebar = document.getElementById('sidebar');
        if (sidebar) sidebar.style.width = lay.sidebarWidth + 'px';
      }
    }
    // お気に入りパネル高さ
    if (lay.favHeight) {
      const favPanel = document.getElementById('fav-panel');
      if (favPanel) { favPanel.style.height = lay.favHeight + 'px'; favPanel.style.flex = 'none'; }
    }
    // 左ペイン幅（ディバイダー位置）
    if (lay.paneLeftWidth) {
      const paneLeft = document.getElementById('pane-left');
      if (paneLeft) { paneLeft.style.flex = 'none'; paneLeft.style.width = lay.paneLeftWidth + 'px'; }
    }
    // プレビューパネル
    if (lay.previewVisible) {
      ST.preview = true;
      document.getElementById('preview-panel').classList.remove('hidden');
      document.getElementById('preview-resize').classList.remove('hidden');
      document.getElementById('btn-preview').classList.add('active');
      if (lay.previewWidth) {
        document.getElementById('preview-panel').style.width = lay.previewWidth + 'px';
      }
    }
    // メタ情報パネル（プレビューが開いているときのみ意味がある）
    if (lay.showMeta && lay.previewVisible) {
      ST.showMeta = true;
      document.getElementById('preview-meta').classList.add('visible');
      document.getElementById('btn-meta').classList.add('active');
    }
    // アクティブペイン
    if (lay.activeSide === 'right') this.setActive('right');
    // サムネイルサイズ
    if (lay.thumbSize) this.applyThumbSize(lay.thumbSize, true);
    // サムネイルボタン同期
    this._syncViewBtn();
    // 複数タブを復元（カレント以外のタブタイトルを表示）
    ['left','right'].forEach(side => this.renderTabs(side));
  },

  // ── Directory Load ───────────────────────────────────────────────────────
  async loadDir(side, tab, path, pushHistory=true) {
    if (path === undefined) path = tab.path;
    tab.loading = true;
    this.renderList(side);
    try {
      const data = await API.listFiles(path);
      if (pushHistory && tab.path && tab.path !== data.path) {
        tab.history.splice(tab.histIdx+1);
        tab.history.push(tab.path);
        tab.histIdx = tab.history.length-1;
      }
      tab.path = data.path;
      tab.parent = data.parent;
      tab.items = data.items;
      tab.selected.clear();
    } catch(e) {
      tab.items = [];
      tab.loading = false;
      this.setStatus('エラー: ' + e.message, true);
      this.renderList(side);
      return;
    }
    tab.loading = false;
    this.renderList(side);
    this.renderTabs(side);
    this.updateAddr(side);
    this.updateStatus(side);
    Tree.syncHighlight(tab.path);
    Favs.syncHighlight(tab.path);
    Layout.save();
  },

  // ── Render Pane ──────────────────────────────────────────────────────────
  renderList(side) {
    const tab = activeTab(side);
    const list = document.getElementById('list-'+side);
    const hdr  = document.getElementById('header-'+side);
    const viewMode = ST.panes[side].viewMode || 'list';

    // update sort indicator on header; hide header in thumb mode
    hdr.style.display = viewMode === 'thumb' ? 'none' : '';
    hdr.querySelectorAll('span').forEach(s => {
      s.classList.remove('sort-asc','sort-desc');
      if (s.dataset.sort === tab.sortBy)
        s.classList.add(tab.sortDir===1?'sort-asc':'sort-desc');
    });

    if (tab.loading) {
      list.className = 'file-list';
      list.innerHTML = '<div class="loading-row">読み込み中...</div>';
      return;
    }

    const items = [...tab.items].sort((a,b) => {
      let va, vb;
      switch(tab.sortBy) {
        case 'size':     va=a.size;     vb=b.size;     break;
        case 'modified': va=a.modified; vb=b.modified; break;
        case 'ext':      va=a.ext;      vb=b.ext;      break;
        default:         va=a.name.toLowerCase(); vb=b.name.toLowerCase();
      }
      if (va < vb) return -tab.sortDir;
      if (va > vb) return  tab.sortDir;
      return 0;
    });

    if (!items.length) {
      list.className = 'file-list';
      list.innerHTML = '<div class="loading-row" style="color:var(--text-dim)">（空のフォルダ）</div>';
      return;
    }

    if (viewMode === 'thumb') {
      list.className = 'file-list thumb-grid';
      const IMG_EXTS = new Set(['.png','.jpg','.jpeg','.gif','.webp','.svg','.bmp','.avif','.ico','.tiff','.tif','.heic','.heif','.exr','.tga','.hdr','.dng']);
      const PSD_EXTS = new Set(['.psd','.psb']);
      const VID_EXTS = new Set(['.mp4','.webm','.ogg','.ogv','.mov','.m4v','.3gp','.mkv','.avi','.wmv','.flv','.mpeg','.mpg','.m2v','.ts','.mts','.m2ts']);
      const rows = items.map(item => {
        const sel = tab.selected.has(item.path) ? ' selected' : '';
        const dir = item.is_dir ? ' is-dir' : '';
        const icon = fileIcon(item);
        let inner;
        if (IMG_EXTS.has(item.ext)) {
          const url = '/raw?path=' + encodeURIComponent(item.path);
          const iconQ = icon.replace(/'/g,"\\'");
          inner = `<img src="${url}" loading="lazy" alt="${esc(item.name)}"
            onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span class=\\'thumb-icon-lg\\'>${iconQ}</span>')">`;
        } else if (PSD_EXTS.has(item.ext)) {
          const url = '/psd-thumb?path=' + encodeURIComponent(item.path);
          const iconQ = icon.replace(/'/g,"\\'");
          inner = `<img src="${url}" loading="lazy" alt="${esc(item.name)}"
            onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span class=\\'thumb-icon-lg\\'>${iconQ}</span>')">`;
        } else if (VID_EXTS.has(item.ext)) {
          const url = '/raw?path=' + encodeURIComponent(item.path);
          inner = `<video data-src="${url}" preload="metadata" muted playsinline
            data-icon="${esc(icon)}"
            onloadeddata="if(!this._s){this._s=1;this.currentTime=0.001}"
            onmouseenter="if(this.src&&this.readyState>=2)this.play()"
            onmouseleave="this.pause();if(this.readyState>=2)this.currentTime=0.001"
            onerror="videoThumbError(this)"></video>
            <span class="vid-badge">▶ VIDEO</span>`;
        } else {
          inner = `<span class="thumb-icon-lg">${icon}</span>`;
        }
        return `<div class="thumb-item${sel}${dir}" data-path="${esc(item.path)}" data-dir="${item.is_dir}" data-side="${side}">
          <div class="thumb-img-wrap">${inner}</div>
          <div class="thumb-label" title="${esc(item.name)}">${esc(item.name)}</div>
        </div>`;
      }).join('');
      list.innerHTML = rows;
      setupLazyVideos(list);
    } else {
      list.className = 'file-list';
      const rows = items.map(item => {
        const sel = tab.selected.has(item.path) ? ' selected' : '';
        const dir = item.is_dir ? ' is-dir' : '';
        const icon = fileIcon(item);
        const size = item.is_dir ? '<DIR>' : fmtSize(item.size);
        const date = fmtDate(item.modified);
        const ext  = item.is_dir ? '' : (item.ext||'').slice(1).toUpperCase();
        return `<div class="file-row${sel}${dir}" data-path="${esc(item.path)}" data-dir="${item.is_dir}" data-side="${side}">
          <div class="f-name"><span class="f-icon">${icon}</span><span class="f-name-text" title="${esc(item.name)}">${esc(item.name)}</span></div>
          <div class="f-size">${size}</div>
          <div class="f-date">${date}</div>
          <div class="f-ext">${ext}</div>
        </div>`;
      }).join('');
      list.innerHTML = rows;
    }
  },

  renderTabs(side) {
    const pane = ST.panes[side];
    const container = document.getElementById('tabs-'+side);
    container.innerHTML = '';
    pane.tabs.forEach((tab, i) => {
      const active = i===pane.cur ? ' active' : '';
      const label = pathBasename(tab.path) || tab.path || '読み込み中...';
      const div = document.createElement('div');
      div.className = 'tab' + active;
      div.dataset.idx = i;
      div.dataset.side = side;
      div.innerHTML = `<span class="tab-name" title="${esc(tab.path)}">${esc(label)}</span>
        ${pane.tabs.length>1?`<span class="tab-close" data-close="${i}">✕</span>`:''}`;
      div.addEventListener('click', e => {
        if (e.target.dataset.close !== undefined) {
          e.stopPropagation();
          this.closeTab(side, +e.target.dataset.close);
        } else {
          e.stopPropagation();
          this.switchTab(side, i);
        }
      });
      container.appendChild(div);
    });
    const add = document.createElement('button');
    add.className = 'tab-add';
    add.textContent = '+';
    add.title = '新規タブ';
    add.onclick = e => { e.stopPropagation(); this.newTab(side); };
    container.appendChild(add);
  },

  updateAddr(side) {
    const tab = activeTab(side);
    const inp = document.getElementById('addr-'+side);
    if (document.activeElement !== inp) inp.value = tab.path;
    document.getElementById('back-'+side).disabled = tab.history.length===0;
    document.getElementById('fwd-'+side).disabled  = tab.histIdx >= tab.history.length-1;
    this.renderCrumbs(side);
  },

  renderCrumbs(side) {
    const crumbs = document.getElementById('crumbs-'+side);
    if (!crumbs) return;
    const tab = activeTab(side);
    const segs = parsePath(tab.path || '');
    crumbs.innerHTML = '';
    segs.forEach((seg, i) => {
      if (i > 0) {
        const sep = document.createElement('span');
        sep.className = 'crumb-sep';
        sep.textContent = '›';
        crumbs.appendChild(sep);
      }
      const el = document.createElement('span');
      el.className = 'crumb' + (i === segs.length - 1 ? ' crumb-active' : '');
      el.textContent = seg.label;
      el.dataset.path = seg.path;
      crumbs.appendChild(el);
    });
    // Scroll to show the rightmost (deepest) segment
    requestAnimationFrame(() => { crumbs.scrollLeft = crumbs.scrollWidth; });
  },

  handleCrumbClick(e, side) {
    const el = e.target.closest('.crumb');
    if (!el) {
      // Click on empty area → edit mode
      this.crumbStartEdit(side);
      return;
    }
    const targetPath = el.dataset.path;
    const tab = activeTab(side);
    if (targetPath === tab.path) {
      // Clicking the active (deepest) segment → edit mode
      this.crumbStartEdit(side);
    } else {
      this.navigateTo(side, targetPath);
    }
  },

  crumbStartEdit(side) {
    const tab = activeTab(side);
    const inp = document.getElementById('addr-'+side);
    const crumbs = document.getElementById('crumbs-'+side);
    inp.value = tab.path;
    crumbs.style.display = 'none';
    inp.classList.add('editing');
    inp.focus();
    inp.select();
  },

  crumbEndEdit(side) {
    const inp = document.getElementById('addr-'+side);
    const crumbs = document.getElementById('crumbs-'+side);
    inp.classList.remove('editing');
    crumbs.style.display = '';
  },

  handleAddrKey(e, side) {
    e.stopPropagation();
    if (e.key === 'Enter') {
      const inp = document.getElementById('addr-'+side);
      this.navigateTo(side, inp.value);
      inp.blur();
    } else if (e.key === 'Escape') {
      document.getElementById('addr-'+side).blur();
    }
  },

  copyPath(side) {
    const path = activeTab(side).path || '';
    const btn = document.querySelector('#pane-'+side+' .addr-copy');
    const doFeedback = () => {
      const orig = btn.textContent;
      btn.textContent = '✓';
      btn.style.color = 'var(--accent)';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    };
    const execFallback = () => {
      const ta = document.createElement('textarea');
      ta.value = path;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { if (document.execCommand('copy')) doFeedback(); } catch(_) {}
      document.body.removeChild(ta);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(path).then(doFeedback).catch(execFallback);
    } else {
      execFallback();
    }
  },

  updateStatus(side) {
    const tab = activeTab(side||ST.active);
    const sel = tab.selected.size;
    const total = tab.items.length;
    const selSize = tab.items
      .filter(i => tab.selected.has(i.path) && !i.is_dir)
      .reduce((s,i) => s+i.size, 0);
    let txt = `${total} アイテム`;
    if (sel) txt += ` | ${sel} 件選択`;
    if (selSize > 0) txt += ` (${fmtSize(selSize)})`;
    document.getElementById('status-left').textContent = txt;
    document.getElementById('status-right').textContent = activeTab(ST.active).path;
  },

  setStatus(msg, err=false) {
    const el = document.getElementById('status-left');
    el.textContent = msg;
    el.style.color = err ? '#f87171' : '';
    setTimeout(() => { el.style.color=''; }, 3000);
  },

  // ── Active pane ──────────────────────────────────────────────────────────
  setActive(side) {
    const changed = ST.active !== side;
    ST.active = side;
    document.getElementById('pane-left').classList.toggle('active',  side==='left');
    document.getElementById('pane-right').classList.toggle('active', side==='right');
    this.updateStatus(side);
    this._syncViewBtn();
    if (changed) Layout.save();
  },

  toggleView(side) {
    if (!side) side = ST.active;
    const pane = ST.panes[side];
    pane.viewMode = pane.viewMode === 'thumb' ? 'list' : 'thumb';
    this.renderList(side);
    this._syncViewBtn();
    Layout.save();
  },

  _syncViewBtn() {
    const btn = document.getElementById('btn-view');
    if (!btn) return;
    const isThumb = ST.panes[ST.active].viewMode === 'thumb';
    btn.classList.toggle('active', isThumb);
    btn.querySelector('.icon').textContent = isThumb ? '☰' : '⊞';
    btn.childNodes[2].textContent = isThumb ? ' リスト' : ' サムネイル';
    btn.title = isThumb ? 'リスト表示 (V)' : 'サムネイル表示 (V)';
    const ctrl = document.getElementById('thumb-size-ctrl');
    if (ctrl) ctrl.classList.toggle('hidden', !isThumb);
  },

  applyThumbSize(size, skipSave=false) {
    ST.thumbSize = size;
    document.documentElement.style.setProperty('--thumb-col', size + 'px');
    const slider = document.getElementById('thumb-slider');
    if (slider) slider.value = size;
    if (!skipSave) Layout.save();
  },

  // ── Navigation ───────────────────────────────────────────────────────────
  navigateTo(side, path) {
    if (!side) side = ST.active;
    this.loadDir(side, activeTab(side), path);
    this.setActive(side);
  },

  navBack(side) {
    if (!side) side = ST.active;
    const tab = activeTab(side);
    if (!tab.history.length) return;
    const prev = tab.history[tab.histIdx] || tab.history[tab.history.length-1];
    if (prev) this.loadDir(side, tab, prev, false);
  },

  navForward(side) {
    if (!side) side = ST.active;
    const tab = activeTab(side);
    const next = tab.history[tab.histIdx+1];
    if (next) { tab.histIdx++; this.loadDir(side, tab, next, false); }
  },

  navUp(side) {
    if (!side) side = ST.active;
    const tab = activeTab(side);
    if (tab.parent && tab.parent !== tab.path) this.loadDir(side, tab, tab.parent);
  },

  refresh(side) {
    if (!side) side = ST.active;
    const tab = activeTab(side);
    this.loadDir(side, tab, tab.path, false);
  },

  openHome() {
    this.loadDir(ST.active, activeTab(ST.active), '~');
  },

  // ── Tabs ─────────────────────────────────────────────────────────────────
  newTab(side) {
    const src = activeTab(side);
    const tab = makeTab(src.path);
    ST.panes[side].tabs.push(tab);
    ST.panes[side].cur = ST.panes[side].tabs.length-1;
    this.loadDir(side, tab);
    this.renderTabs(side);
    Layout.save();
  },

  closeTab(side, idx) {
    const pane = ST.panes[side];
    if (pane.tabs.length===1) return;
    pane.tabs.splice(idx, 1);
    if (pane.cur >= pane.tabs.length) pane.cur = pane.tabs.length-1;
    else if (pane.cur > idx) pane.cur--;
    this.renderTabs(side);
    this.renderList(side);
    this.updateAddr(side);
    this.updateStatus(side);
    Layout.save();
  },

  switchTab(side, idx) {
    ST.panes[side].cur = idx;
    this.renderTabs(side);
    this.renderList(side);
    this.updateAddr(side);
    this.updateStatus(side);
    this.setActive(side);
    Layout.save();
  },

  // ── Selection ────────────────────────────────────────────────────────────
  handleRowClick(e, side) {
    const row = e.target.closest('.file-row,.thumb-item');
    if (!row) return;
    this.setActive(side);
    const tab = activeTab(side);
    const path = row.dataset.path;

    if (e.detail===2) { // double click
      if (row.dataset.dir==='true') this.loadDir(side, tab, path);
      else this.openFile(path);
      return;
    }

    const isDir = row.dataset.dir==='true';
    if (e.ctrlKey || e.metaKey) {
      if (tab.selected.has(path)) tab.selected.delete(path);
      else tab.selected.add(path);
    } else if (e.shiftKey && tab.selected.size) {
      // range select
      const allRows = [...document.getElementById('list-'+side).querySelectorAll('.file-row,.thumb-item')];
      const paths = allRows.map(r=>r.dataset.path);
      const lastSel = [...tab.selected].pop();
      const a = paths.indexOf(lastSel);
      const b = paths.indexOf(path);
      const [lo,hi] = [Math.min(a,b), Math.max(a,b)];
      paths.slice(lo, hi+1).forEach(p => tab.selected.add(p));
    } else {
      tab.selected.clear();
      tab.selected.add(path);
    }

    this._syncSelection(side);
    this.updateStatus(side);

    if (ST.preview && tab.selected.size===1 && !isDir) {
      this.loadPreview(path);
    }
  },

  _syncSelection(side) {
    const tab = activeTab(side);
    const list = document.getElementById('list-'+side);
    list.querySelectorAll('.file-row,.thumb-item').forEach(el => {
      el.classList.toggle('selected', tab.selected.has(el.dataset.path));
    });
  },

  openFile(path) {
    this.loadPreview(path);
  },

  // ── Preview ──────────────────────────────────────────────────────────────
  togglePreview() {
    ST.preview = !ST.preview;
    document.getElementById('preview-panel').classList.toggle('hidden', !ST.preview);
    document.getElementById('preview-resize').classList.toggle('hidden', !ST.preview);
    document.getElementById('btn-preview').classList.toggle('active', ST.preview);
    Layout.save();
    if (!ST.preview) return;
    const tab = activeTab(ST.active);
    const sel = [...tab.selected];
    if (sel.length===1) {
      const item = tab.items.find(i=>i.path===sel[0]);
      if (item && !item.is_dir) this.loadPreview(sel[0]);
    }
  },

  async loadPreview(path) {
    if (!ST.preview) return;
    ST.lastPreviewPath = path;
    const pc = document.getElementById('preview-content');
    const pt = document.getElementById('preview-title');
    pt.textContent = pathBasename(path);
    pc.className = '';
    pc.innerHTML = '<div class="loading-row">読み込み中...</div>';
    try {
      const d = await API.preview(path);
      pc.className = '';

      if (d.type === 'image') {
        pc.className = 'img-mode';
        pc.innerHTML = `<img src="${d.url}" alt="preview">`;

      } else if (d.type === 'video') {
        pc.innerHTML = `<div class="preview-video">
          <video controls preload="metadata" style="max-width:100%;max-height:280px;border-radius:4px;background:#000">
            <source src="${d.url}" type="${esc(d.mime)}">
            <p style="color:var(--text-dim)">このブラウザでは再生できません (${esc(d.mime)})</p>
          </video>
        </div>`;

      } else if (d.type === 'audio') {
        pc.innerHTML = `<div class="preview-audio">
          <span class="big-icon">🎵</span>
          <div style="margin-bottom:8px;font-size:12px">${esc(pathBasename(path))}</div>
          <audio controls style="width:100%">
            <source src="${d.url}" type="${esc(d.mime)}">
          </audio>
        </div>`;

      } else if (d.type === 'pdf') {
        pc.className = 'pdf-mode';
        pc.innerHTML = `
          <div style="height:100%;display:flex;align-items:center;justify-content:center;
              flex-direction:column;gap:8px;color:var(--text-dim)">
            <div style="font-size:28px">📕</div>
            <div style="font-size:12px">PDF 読み込み中...</div>
          </div>`;
        renderPDF(d.url, d.size, pc, path);

      } else if (d.type === 'text') {
        const ext = d.ext || '';
        const trunc = d.truncated
          ? '<div style="color:#f87171;font-size:10px;padding:2px 4px;background:rgba(248,113,113,.1)">先頭100KBのみ表示</div>' : '';
        pc.innerHTML = trunc + `<pre data-ext="${esc(ext)}">${esc(d.content)}</pre>`;

      } else if (d.type === 'csv') {
        if (!d.rows || !d.rows.length) {
          pc.innerHTML = '<div class="preview-empty">データなし</div>';
        } else {
          const header = d.rows[0];
          const body   = d.rows.slice(1);
          const th = header.map((c,i) => `<th>${esc(c)||'列'+(i+1)}</th>`).join('');
          const trs = body.map((row, ri) => {
            const tds = header.map((_,i) => `<td title="${esc(row[i]||'')}">${esc(row[i]||'')}</td>`).join('');
            return `<tr><td class="csv-row-num">${ri+2}</td>${tds}</tr>`;
          }).join('');
          const trunc = d.truncated ? `<div style="color:#f87171;font-size:10px;padding:2px 6px">先頭500行のみ表示</div>` : '';
          pc.innerHTML = `${trunc}<div class="preview-csv"><table>
            <thead><tr><th style="min-width:30px">#</th>${th}</tr></thead>
            <tbody>${trs}</tbody>
          </table></div>`;
        }

      } else if (d.type === 'archive') {
        const rows = (d.entries || []).map(e =>
          `<div class="preview-archive-row">
            <div class="arc-name${e.is_dir?' is-dir':''}">${e.is_dir?'📁 ':'📄 '}${esc(e.name)}</div>
            <div class="arc-size">${e.is_dir ? '' : fmtSize(e.size)}</div>
          </div>`
        ).join('');
        const trunc = d.entries && d.entries.length >= 1000
          ? '<div style="color:#f87171;font-size:10px;padding:2px 8px">先頭1000件のみ表示</div>' : '';
        pc.innerHTML = `<div class="preview-archive">
          <div class="preview-archive-hdr">
            <div>${d.format} — ${(d.entries||[]).length} アイテム</div>
            <div style="text-align:right">サイズ</div>
          </div>
          ${rows}${trunc}
        </div>`;

      } else {
        pc.innerHTML = `<div class="preview-binary">
          <span class="big-icon">${fileIcon({ext:path.slice(path.lastIndexOf('.')),is_dir:false})}</span>
          <div style="margin-top:8px;font-size:12px">${esc(pathBasename(path))}</div>
          <div style="margin-top:6px;color:var(--text-dim);font-size:11px">${esc(d.mime||'')}</div>
          <div style="margin-top:2px;color:var(--text-dim);font-size:11px">${fmtSize(d.size)}</div>
          <div style="margin-top:12px;color:var(--text-dim);font-size:11px">プレビュー非対応</div>
        </div>`;
      }
    } catch(e) {
      pc.innerHTML = `<div class="error-row">${esc(e.message)}</div>`;
    }
    this.loadMeta(path);
  },

  toggleMeta() {
    ST.showMeta = !ST.showMeta;
    document.getElementById('preview-meta').classList.toggle('visible', ST.showMeta);
    document.getElementById('btn-meta').classList.toggle('active', ST.showMeta);
    Layout.save();
    if (ST.showMeta && ST.lastPreviewPath) this.loadMeta(ST.lastPreviewPath);
  },

  async loadMeta(path) {
    const panel = document.getElementById('preview-meta');
    if (!ST.showMeta || !panel.classList.contains('visible')) return;
    panel.innerHTML = '<div class="meta-rows"><div class="meta-row"><span class="meta-label">...</span><span class="meta-value">読み込み中</span></div></div>';
    try {
      const d = await API.meta(path);
      const rows = [
        ['名前', d.name],
        ['パス', d.path],
        ['種別', d.mime],
        ['サイズ', d.is_dir ? '—' : fmtSize(d.size) + (d.size >= 0 ? `  (${d.size.toLocaleString()} B)` : '')],
        ['更新日時', new Date(d.modified * 1000).toLocaleString('ja')],
        ['作成日時', new Date(d.created  * 1000).toLocaleString('ja')],
        ['アクセス', new Date(d.accessed * 1000).toLocaleString('ja')],
        ['権限', d.permissions],
      ];
      if (d.lines !== undefined) rows.splice(3, 0, ['行数', d.lines.toLocaleString() + ' 行']);
      panel.innerHTML = '<div class="meta-rows">' +
        rows.map(([label, val]) =>
          `<div class="meta-row"><span class="meta-label">${esc(label)}</span><span class="meta-value">${esc(String(val??''))}</span></div>`
        ).join('') + '</div>';
    } catch(e) {
      panel.innerHTML = `<div class="meta-row"><span class="meta-label">エラー</span><span class="meta-value" style="color:#f87171">${esc(e.message)}</span></div>`;
    }
  },

  // ── Search ───────────────────────────────────────────────────────────────
  toggleSearch() {
    ST.search = !ST.search;
    const bar = document.getElementById('search-bar');
    bar.classList.toggle('visible', ST.search);
    document.getElementById('btn-search').classList.toggle('active', ST.search);
    if (ST.search) {
      document.getElementById('search-input').focus();
    } else {
      // restore normal view
      document.getElementById('search-results-info').textContent = '';
      document.getElementById('search-input').value = '';
      this.renderList('left');
      this.renderList('right');
    }
  },

  async runSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const side = ST.active;
    ST.searchPane = side;
    const tab = activeTab(side);
    const info = document.getElementById('search-results-info');
    info.textContent = '検索中...';
    try {
      const data = await API.search(q, tab.path);
      tab.items = data.results;
      tab.selected.clear();
      this.renderList(side);
      info.textContent = `${data.total} 件見つかりました`;
    } catch(e) {
      info.textContent = 'エラー: ' + e.message;
    }
  },

  // ── File Operations ──────────────────────────────────────────────────────
  async copySelected() {
    const src_side = ST.active;
    const dst_side = otherSide(src_side);
    const tab = activeTab(src_side);
    const dst = activeTab(dst_side).path;
    if (!tab.selected.size) { this.setStatus('コピーするファイルを選択してください'); return; }
    let ok=0, fail=0;
    for (const p of tab.selected) {
      try { await API.copy(p, dst); ok++; }
      catch(e) { fail++; console.error(e); }
    }
    this.setStatus(`コピー完了: ${ok} 件${fail?` (失敗: ${fail})`:''}`);
    this.refresh(dst_side);
  },

  async moveSelected() {
    const src_side = ST.active;
    const dst_side = otherSide(src_side);
    const tab = activeTab(src_side);
    const dst = activeTab(dst_side).path;
    if (!tab.selected.size) { this.setStatus('移動するファイルを選択してください'); return; }
    if (!confirm(`${tab.selected.size} 件を移動しますか？`)) return;
    let ok=0, fail=0;
    for (const p of tab.selected) {
      try { await API.move(p, dst); ok++; }
      catch(e) { fail++; console.error(e); }
    }
    this.setStatus(`移動完了: ${ok} 件${fail?` (失敗: ${fail})`:''}`);
    this.refresh(src_side);
    this.refresh(dst_side);
  },

  async deleteSelected() {
    const tab = activeTab(ST.active);
    if (!tab.selected.size) { this.setStatus('削除するファイルを選択してください'); return; }
    if (!confirm(`${tab.selected.size} 件を削除しますか？\n（元に戻せません）`)) return;
    let ok=0, fail=0;
    for (const p of tab.selected) {
      try { await API.del(p); ok++; }
      catch(e) { fail++; console.error(e); }
    }
    this.setStatus(`削除完了: ${ok} 件${fail?` (失敗: ${fail})`:''}`);
    this.refresh(ST.active);
  },

  promptNewFolder() {
    this.openModal('新規フォルダ', '新しいフォルダ', async (name) => {
      if (!name) return;
      const tab = activeTab(ST.active);
      const newPath = pathJoin(tab.path, name);
      try {
        await API.mkdir(newPath);
        this.setStatus(`フォルダ作成: ${name}`);
        this.refresh(ST.active);
      } catch(e) { this.setStatus('エラー: '+e.message, true); }
    });
  },

  promptRename() {
    const tab = activeTab(ST.active);
    if (!tab.selected.size) return;
    const path = [...tab.selected][0];
    const name = pathBasename(path);
    this.openModal('名前変更', name, async (newName) => {
      if (!newName || newName===name) return;
      const dst = pathJoin(tab.path, newName);
      try {
        await API.rename(path, dst);
        this.setStatus(`名前変更: ${name} → ${newName}`);
        this.refresh(ST.active);
      } catch(e) { this.setStatus('エラー: '+e.message, true); }
    });
  },

  // ── Context Menu ─────────────────────────────────────────────────────────
  showCtx(e, side) {
    e.preventDefault();
    this.setActive(side);
    const row = e.target.closest('.file-row,.thumb-item');
    if (row) {
      const tab = activeTab(side);
      if (!tab.selected.has(row.dataset.path)) {
        tab.selected.clear();
        tab.selected.add(row.dataset.path);
        this.renderList(side);
      }
    }
    const menu = document.getElementById('ctx-menu');
    menu.style.left = Math.min(e.clientX, window.innerWidth-170) + 'px';
    menu.style.top  = Math.min(e.clientY, window.innerHeight-200) + 'px';
    menu.classList.add('visible');
  },

  hideCtx() { document.getElementById('ctx-menu').classList.remove('visible'); },

  ctxOpen() {
    this.hideCtx();
    const tab = activeTab(ST.active);
    if (!tab.selected.size) return;
    const path = [...tab.selected][0];
    const item = tab.items.find(i=>i.path===path);
    if (item?.is_dir) this.loadDir(ST.active, tab, path);
    else this.openFile(path);
  },

  ctxOpenOther() {
    this.hideCtx();
    const tab = activeTab(ST.active);
    if (!tab.selected.size) return;
    const path = [...tab.selected][0];
    const item = tab.items.find(i=>i.path===path);
    if (item?.is_dir) this.loadDir(otherSide(ST.active), activeTab(otherSide(ST.active)), path);
  },

  // ── Modal ─────────────────────────────────────────────────────────────────
  openModal(title, defaultVal, cb) {
    document.getElementById('modal-title').textContent = title;
    const inp = document.getElementById('modal-input');
    inp.value = defaultVal || '';
    ST.modalCb = cb;
    document.getElementById('modal-overlay').classList.add('visible');
    setTimeout(() => { inp.focus(); inp.select(); }, 50);
  },

  closeModal() {
    document.getElementById('modal-overlay').classList.remove('visible');
    ST.modalCb = null;
  },

  modalConfirm() {
    const val = document.getElementById('modal-input').value.trim();
    const cb = ST.modalCb;
    this.closeModal();
    if (cb) cb(val);
  },

  // ── Keyboard ─────────────────────────────────────────────────────────────
  setupKeyboard() {
    document.addEventListener('keydown', e => {
      const tag = document.activeElement?.tagName;
      const inInput = tag==='INPUT' || tag==='TEXTAREA';
      const modal = document.getElementById('modal-overlay').classList.contains('visible');

      if (modal) {
        if (e.key==='Enter') { e.preventDefault(); this.modalConfirm(); }
        if (e.key==='Escape') this.closeModal();
        return;
      }

      if (inInput) {
        if (e.key==='Escape') document.activeElement.blur();
        return;
      }

      switch(e.key) {
        case 'Tab':
          e.preventDefault();
          this.setActive(otherSide(ST.active));
          break;
        case 'F2':
          e.preventDefault();
          if (e.shiftKey) Renamer.open();
          else this.promptRename();
          break;
        case 'F3': e.preventDefault(); this.togglePreview(); break;
        case 'F5':
          e.preventDefault();
          if (e.shiftKey) this.refresh();
          else this.copySelected();
          break;
        case 'F6': e.preventDefault(); this.moveSelected(); break;
        case 'F8': case 'Delete': e.preventDefault(); this.deleteSelected(); break;
        case 'Backspace': e.preventDefault(); this.navUp(); break;
        case 'Enter': {
          const tab = activeTab(ST.active);
          if (tab.selected.size===1) {
            const p = [...tab.selected][0];
            const item = tab.items.find(i=>i.path===p);
            if (item?.is_dir) this.loadDir(ST.active, tab, p);
            else this.openFile(p);
          }
          break;
        }
        case 'a': case 'A':
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            const tab = activeTab(ST.active);
            tab.items.forEach(i => tab.selected.add(i.path));
            this.renderList(ST.active);
            this.updateStatus(ST.active);
          }
          break;
        case 'f': case 'F':
          if (e.ctrlKey || e.metaKey) { e.preventDefault(); this.toggleSearch(); }
          break;
        case 't': case 'T':
          if (e.ctrlKey || e.metaKey) { e.preventDefault(); Tree.toggle(); }
          break;
        case 'i': case 'I':
          if (ST.preview) { e.preventDefault(); FM.toggleMeta(); }
          break;
        case 'v': case 'V':
          e.preventDefault();
          this.toggleView();
          break;
        case 'Escape':
          if (ST.search) { this.toggleSearch(); break; }
          { const tab = activeTab(ST.active);
            tab.selected.clear();
            this.renderList(ST.active);
            this.updateStatus(ST.active); }
          break;
        case 'ArrowLeft':
          if (e.altKey) { e.preventDefault(); this.navBack(); }
          break;
        case 'ArrowRight':
          if (e.altKey) { e.preventDefault(); this.navForward(); }
          break;
        case 'ArrowUp': case 'ArrowDown':
        case 'ArrowLeft': case 'ArrowRight': {
          e.preventDefault();
          const tab = activeTab(ST.active);
          const list = document.getElementById('list-'+ST.active);
          const rows = [...list.querySelectorAll('.file-row,.thumb-item')];
          const paths = rows.map(r=>r.dataset.path);
          if (!paths.length) break;
          const lastSel = [...tab.selected].pop();
          const idx = paths.indexOf(lastSel);
          let next = idx;
          if (e.key==='ArrowUp' || e.key==='ArrowLeft') next = Math.max(0, idx-1);
          else next = Math.min(paths.length-1, idx+1);
          if (idx===-1) next=0;
          tab.selected.clear();
          tab.selected.add(paths[next]);
          this.renderList(ST.active);
          this.updateStatus(ST.active);
          rows[next]?.scrollIntoView({block:'nearest'});
          if (ST.preview) {
            const item = tab.items.find(i=>i.path===paths[next]);
            if (item && !item.is_dir) this.loadPreview(paths[next]);
          }
          break;
        }
      }
    });
  },

  // ── Event Listeners ──────────────────────────────────────────────────────
  setupListeners() {
    ['left','right'].forEach(side => {
      const list = document.getElementById('list-'+side);
      list.addEventListener('click',       e => this.handleRowClick(e, side));
      list.addEventListener('dblclick',    e => this.handleRowClick(e, side));
      list.addEventListener('contextmenu', e => this.showCtx(e, side));
    });

    document.addEventListener('click', () => this.hideCtx());
    document.addEventListener('contextmenu', e => {
      if (!e.target.closest('.file-list')) this.hideCtx();
    });

    // drag & drop between panes
    this.setupDragDrop();
  },

  // ── Drag & Drop ──────────────────────────────────────────────────────────
  setupDragDrop() {
    ['left','right'].forEach(side => {
      const list = document.getElementById('list-'+side);

      list.addEventListener('dragstart', e => {
        const row = e.target.closest('.file-row,.thumb-item');
        if (!row) return;
        const tab = activeTab(side);
        if (!tab.selected.has(row.dataset.path)) {
          tab.selected.clear();
          tab.selected.add(row.dataset.path);
          this.renderList(side);
        }
        e.dataTransfer.setData('text/plain', JSON.stringify({
          side, paths: [...tab.selected]
        }));
        e.dataTransfer.effectAllowed = 'copyMove';
      });

      list.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = e.ctrlKey ? 'copy' : 'move';
      });

      list.addEventListener('drop', async e => {
        e.preventDefault();
        let payload;
        try { payload = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
        if (payload.side === side) return; // same pane, no-op
        const dstTab = activeTab(side);
        const op = e.ctrlKey ? 'copy' : 'move';
        let ok=0, fail=0;
        for (const p of payload.paths) {
          try {
            if (op==='copy') await API.copy(p, dstTab.path);
            else await API.move(p, dstTab.path);
            ok++;
          } catch(err) { fail++; }
        }
        this.setStatus(`${op==='copy'?'コピー':'移動'}完了: ${ok}件${fail?` (失敗:${fail})`:''}`);
        this.refresh(side);
        if (op==='move') this.refresh(payload.side);
      });

      // make rows draggable
      list.addEventListener('mousedown', e => {
        const row = e.target.closest('.file-row,.thumb-item');
        if (row) row.draggable = true;
      });
    });
  },

  // ── Resizable Divider ────────────────────────────────────────────────────
  setupDivider() {
    // 左右ペイン分割
    this._makeHResize(
      document.getElementById('divider'),
      document.getElementById('pane-left'),
      120, () => {
        const mainW = document.getElementById('main').getBoundingClientRect().width;
        const sideW  = ST.treeVisible ? document.getElementById('sidebar').getBoundingClientRect().width + 4 : 0;
        const prevW  = ST.preview     ? document.getElementById('preview-panel').getBoundingClientRect().width + 4 : 0;
        return mainW - sideW - 5 - prevW - 120;
      }
    );
    // プレビューパネル幅
    this._makeHResizeInv(
      document.getElementById('preview-resize'),
      document.getElementById('preview-panel'),
      180, 640
    );
  },

  _makeHResize(handle, target, min, maxFn) {
    let drag=false, sx=0, sw=0;
    handle.addEventListener('mousedown', e => {
      drag=true; sx=e.clientX; sw=target.getBoundingClientRect().width;
      handle.classList.add('dragging'); document.body.style.cursor='col-resize';
    });
    document.addEventListener('mousemove', e => {
      if (!drag) return;
      const max = typeof maxFn==='function' ? maxFn() : maxFn;
      const w = Math.max(min, Math.min(max, sw + e.clientX - sx));
      target.style.flex='none'; target.style.width=w+'px';
    });
    document.addEventListener('mouseup', () => {
      if (!drag) return;
      drag=false; handle.classList.remove('dragging'); document.body.style.cursor='';
      Layout.save();
    });
  },

  _makeHResizeInv(handle, target, min, max) {
    // ドラッグ方向が逆（左ドラッグ = 幅増）
    let drag=false, sx=0, sw=0;
    handle.addEventListener('mousedown', e => {
      drag=true; sx=e.clientX; sw=target.getBoundingClientRect().width;
      handle.classList.add('dragging'); document.body.style.cursor='col-resize';
    });
    document.addEventListener('mousemove', e => {
      if (!drag) return;
      const w = Math.max(min, Math.min(max, sw - (e.clientX - sx)));
      target.style.width=w+'px';
    });
    document.addEventListener('mouseup', () => {
      if (!drag) return;
      drag=false; handle.classList.remove('dragging'); document.body.style.cursor='';
      Layout.save();
    });
  },
};

// ─────────────────── FAVORITES ──────────────────────────────────────────────
const Favs = {
  KEY: 'fm-favorites',
  items: [],
  _ready: false,

  _defaults() {
    return [
      { name: 'ホーム',       path: '~',            icon: '🏠' },
      { name: 'デスクトップ', path: '~/Desktop',     icon: '🖥' },
      { name: 'ドキュメント', path: '~/Documents',   icon: '📄' },
      { name: 'ダウンロード', path: '~/Downloads',   icon: '📥' },
      { name: 'ピクチャ',     path: '~/Pictures',    icon: '🖼' },
      { name: 'ミュージック', path: '~/Music',       icon: '🎵' },
      { name: 'ムービー',     path: '~/Movies',      icon: '🎬' },
    ];
  },

  load() {
    try {
      const saved = localStorage.getItem(this.KEY);
      this.items = saved ? JSON.parse(saved) : this._defaults();
    } catch { this.items = this._defaults(); }
  },

  save() {
    try { localStorage.setItem(this.KEY, JSON.stringify(this.items)); } catch {}
  },

  addCurrent() {
    const tab = activeTab(ST.active);
    const path = tab?.path;
    if (!path) return;
    if (this.items.find(i => i.path === path)) {
      FM.setStatus('このフォルダは既にお気に入りに登録されています');
      return;
    }
    const name = pathBasename(path) || path;
    this.items.push({ name, path, icon: '📁' });
    this.save();
    this.render();
    FM.setStatus(`お気に入りに追加: ${name}`);
  },

  remove(path, e) {
    if (e) e.stopPropagation();
    this.items = this.items.filter(i => i.path !== path);
    this.save();
    this.render();
  },

  navigate(path) {
    FM.navigateTo(ST.active, path);
    this.syncHighlight(path);
    Tree.syncHighlight(path);
  },

  syncHighlight(path) {
    document.querySelectorAll('.fav-item').forEach(el =>
      el.classList.toggle('fav-active', el.dataset.path === path));
  },

  render() {
    const list = document.getElementById('fav-list');
    if (!list) return;
    const cur = activeTab(ST.active)?.path || '';
    if (!this.items.length) {
      list.innerHTML = '<div style="padding:8px 10px;font-size:11px;color:var(--text-dim)">フォルダをここにドロップ</div>';
      return;
    }
    list.innerHTML = this.items.map((item, i) => {
      const act = item.path === cur ? ' fav-active' : '';
      return `<div class="fav-item${act}" data-path="${esc(item.path)}" data-idx="${i}"
          title="${esc(item.path)}" onclick="Favs.navigate('${esc(item.path)}')">
        <span class="fav-handle" title="ドラッグして並べ替え">⠿</span>
        <span class="fav-icon">${item.icon}</span>
        <span class="fav-name">${esc(item.name)}</span>
        <span class="fav-remove" onclick="Favs.remove('${esc(item.path)}',event)" title="削除">✕</span>
      </div>`;
    }).join('');
  },

  init() {
    if (this._ready) return;
    this._ready = true;
    this.load();
    this.render();
    this._setupFavResize();
    this._setupDrop();
    this._setupReorder();
  },

  _setupReorder() {
    const list = document.getElementById('fav-list');
    if (!list || list.dataset.reorderInit) return;
    list.dataset.reorderInit = '1';
    let dragSrcIdx = -1;

    // ハンドルを押したときだけ draggable を有効にする
    list.addEventListener('mousedown', e => {
      const handle = e.target.closest('.fav-handle');
      if (!handle) return;
      const item = handle.closest('.fav-item');
      if (item) item.setAttribute('draggable', 'true');
    });

    list.addEventListener('dragstart', e => {
      const item = e.target.closest('.fav-item[draggable="true"]');
      if (!item) { e.preventDefault(); return; }
      dragSrcIdx = +item.dataset.idx;
      e.dataTransfer.setData('text/fav-reorder', String(dragSrcIdx));
      e.dataTransfer.effectAllowed = 'move';
      // 少し遅らせてクラスを付与（即時だと掴んだ見た目が消える）
      setTimeout(() => item.classList.add('fav-dragging'), 0);
    });

    list.addEventListener('dragover', e => {
      if (!e.dataTransfer.types.includes('text/fav-reorder')) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const target = e.target.closest('.fav-item');
      list.querySelectorAll('.fav-item').forEach(el =>
        el.classList.remove('fav-drop-above', 'fav-drop-below'));
      if (target && +target.dataset.idx !== dragSrcIdx) {
        const r = target.getBoundingClientRect();
        target.classList.add(e.clientY < r.top + r.height / 2 ? 'fav-drop-above' : 'fav-drop-below');
      }
    });

    list.addEventListener('dragleave', e => {
      if (!e.dataTransfer.types.includes('text/fav-reorder')) return;
      if (!list.contains(e.relatedTarget)) {
        list.querySelectorAll('.fav-item').forEach(el =>
          el.classList.remove('fav-drop-above', 'fav-drop-below'));
      }
    });

    list.addEventListener('drop', e => {
      if (!e.dataTransfer.types.includes('text/fav-reorder')) return;
      e.preventDefault();
      list.querySelectorAll('.fav-item').forEach(el =>
        el.classList.remove('fav-drop-above', 'fav-drop-below', 'fav-dragging'));

      const srcIdx = +e.dataTransfer.getData('text/fav-reorder');
      const target = e.target.closest('.fav-item');
      if (!target || isNaN(+target.dataset.idx)) { dragSrcIdx = -1; return; }
      const tgtIdx = +target.dataset.idx;
      if (srcIdx === tgtIdx) { dragSrcIdx = -1; return; }

      const r = target.getBoundingClientRect();
      let insertAt = e.clientY < r.top + r.height / 2 ? tgtIdx : tgtIdx + 1;
      const moved = this.items.splice(srcIdx, 1)[0];
      if (insertAt > srcIdx) insertAt--;
      this.items.splice(insertAt, 0, moved);

      this.save();
      this.render();
      dragSrcIdx = -1;
    });

    list.addEventListener('dragend', () => {
      list.querySelectorAll('.fav-item').forEach(el => {
        el.classList.remove('fav-dragging', 'fav-drop-above', 'fav-drop-below');
        el.removeAttribute('draggable');
      });
      dragSrcIdx = -1;
    });
  },

  _setupFavResize() {
    const handle   = document.getElementById('fav-resize');
    const favPanel = document.getElementById('fav-panel');
    let drag=false, sy=0, sh=0;
    handle.addEventListener('mousedown', e => {
      drag=true; sy=e.clientY; sh=favPanel.getBoundingClientRect().height;
      handle.classList.add('dragging'); document.body.style.cursor='row-resize';
    });
    document.addEventListener('mousemove', e => {
      if (!drag) return;
      const h = Math.max(52, Math.min(480, sh + e.clientY - sy));
      favPanel.style.height = h+'px';
      favPanel.style.flex = 'none';
    });
    document.addEventListener('mouseup', () => {
      if (!drag) return;
      drag=false; handle.classList.remove('dragging'); document.body.style.cursor='';
      Layout.save();
    });
  },

  _setupDrop() {
    const list = document.getElementById('fav-list');
    if (!list) return;
    ['dragover','dragenter'].forEach(ev =>
      list.addEventListener(ev, e => {
        if (e.dataTransfer.types.includes('text/fav-reorder')) return;
        e.preventDefault(); list.classList.add('fav-drop-hint');
      })
    );
    list.addEventListener('dragleave', e => {
      if (!list.contains(e.relatedTarget)) list.classList.remove('fav-drop-hint');
    });
    list.addEventListener('drop', e => {
      if (e.dataTransfer.types.includes('text/fav-reorder')) return;
      e.preventDefault();
      list.classList.remove('fav-drop-hint');
      try {
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        const tab  = activeTab(data.side);
        for (const p of data.paths) {
          const item = tab.items.find(i => i.path === p);
          if (item?.is_dir && !this.items.find(f => f.path === p)) {
            this.items.push({ name: pathBasename(p)||p, path: p, icon: '📁' });
          }
        }
        this.save();
        this.render();
      } catch {}
    });
  },
};

// ─────────────────── RENAMER ────────────────────────────────────────────────
const Renamer = {
  files: [],
  mode: 'replace',
  _ready: false,

  open() {
    const tab = activeTab(ST.active);
    if (!tab.selected.size) { FM.setStatus('リネームするファイルを選択してください'); return; }
    this.files = [...tab.selected].map(path => {
      const name  = pathBasename(path);
      const dotIdx = name.lastIndexOf('.');
      return {
        path,
        name,
        base: dotIdx > 0 ? name.slice(0, dotIdx) : name,
        ext:  dotIdx > 0 ? name.slice(dotIdx)     : '',
        dir:  path.slice(0, path.length - name.length),
      };
    });
    document.getElementById('ren-hdr-count').textContent = `${this.files.length} 件選択`;
    document.getElementById('renamer-overlay').classList.add('visible');
    this._setup();
    this.updatePreview();
  },

  close() {
    document.getElementById('renamer-overlay').classList.remove('visible');
  },

  setMode(mode) {
    this.mode = mode;
    document.querySelectorAll('.ren-mode-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === mode));
    document.querySelectorAll('.ren-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('ren-panel-' + mode)?.classList.add('active');
    const hideApply = mode === 'ext' || mode === 'number';
    document.getElementById('ren-apply-field').style.display = hideApply ? 'none' : '';
    document.getElementById('ren-apply-sep').style.display   = hideApply ? 'none' : '';
    this.updatePreview();
  },

  _setup() {
    if (this._ready) return;
    this._ready = true;
    document.getElementById('ren-opts').addEventListener('input',  () => this.updatePreview());
    document.getElementById('ren-opts').addEventListener('change', () => this.updatePreview());
    document.getElementById('renamer-overlay').addEventListener('click', e => {
      if (e.target.id === 'renamer-overlay') this.close();
    });
    document.getElementById('renamer-overlay').addEventListener('keydown', e => {
      if (e.key === 'Escape') this.close();
    });
  },

  _xform(s, idx) {
    switch (this.mode) {
      case 'replace': {
        const find    = document.getElementById('ren-find').value;
        const repl    = document.getElementById('ren-repl').value;
        if (!find) return s;
        const useRx   = document.getElementById('ren-regex').checked;
        const caseSen = document.getElementById('ren-casesen').checked;
        if (useRx) {
          try { return s.replace(new RegExp(find, caseSen ? 'g' : 'gi'), repl); }
          catch { return null; }
        }
        const safe = find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return s.replace(new RegExp(safe, caseSen ? 'g' : 'gi'), repl);
      }
      case 'number': {
        const pos    = document.getElementById('ren-num-pos').value;
        const sep    = document.getElementById('ren-num-sep').value;
        const start  = parseInt(document.getElementById('ren-num-start').value)  || 0;
        const step   = parseInt(document.getElementById('ren-num-step').value)   || 1;
        const digits = parseInt(document.getElementById('ren-num-digits').value) || 2;
        const num    = String(start + idx * step).padStart(digits, '0');
        return pos === 'prefix' ? num + sep + s : s + sep + num;
      }
      case 'affix': {
        const pre = document.getElementById('ren-prefix').value;
        const suf = document.getElementById('ren-suffix').value;
        return pre + s + suf;
      }
      case 'case': {
        const cm = document.querySelector('input[name="ren-case"]:checked')?.value || 'lower';
        if (cm === 'upper')    return s.toUpperCase();
        if (cm === 'lower')    return s.toLowerCase();
        if (cm === 'title')    return s.replace(/(?:^|[\s\-_.])\S/g, c => c.toUpperCase());
        if (cm === 'sentence') return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
        return s;
      }
      case 'remove': {
        const front = Math.max(0, parseInt(document.getElementById('ren-rm-front').value) || 0);
        const back  = Math.max(0, parseInt(document.getElementById('ren-rm-back').value)  || 0);
        let r = s;
        if (front) r = r.slice(front);
        if (back)  r = back < r.length ? r.slice(0, -back) : '';
        return r;
      }
      default: return s;
    }
  },

  getNewName(file, idx) {
    if (this.mode === 'ext') {
      let newExt = (document.getElementById('ren-new-ext').value || '').trim();
      if (newExt && !newExt.startsWith('.')) newExt = '.' + newExt;
      return file.base + newExt;
    }

    const applyTo = document.getElementById('ren-apply-to').value;
    let base = file.base, ext = file.ext;

    if (applyTo === 'name' || applyTo === 'both') {
      const r = this._xform(base, idx);
      if (r === null) return null;
      base = r;
    }
    if ((applyTo === 'ext' || applyTo === 'both') && ext) {
      const skipExt = this.mode === 'case' && !document.getElementById('ren-case-ext').checked;
      if (!skipExt) {
        const r = this._xform(ext.slice(1), idx);
        if (r !== null) ext = '.' + r;
      }
    }
    return base + ext;
  },

  updatePreview() {
    const list = document.getElementById('ren-prev-list');
    const ftrSt = document.getElementById('ren-ftr-st');
    const newNames = new Set();
    let changed = 0, conflicts = 0, errors = 0;

    const rows = this.files.map((file, idx) => {
      let newName;
      try { newName = this.getNewName(file, idx); }
      catch { newName = null; }

      if (newName === null) {
        errors++;
        return `<div class="ren-prow error">
          <div class="rp-old" title="${esc(file.name)}">${esc(file.name)}</div>
          <div class="rp-arr">→</div>
          <div class="rp-new">正規表現エラー</div>
          <div class="rp-st">✕</div>
        </div>`;
      }

      const same     = newName === file.name;
      const conflict = !same && newNames.has(newName);
      if (!same) { changed++; newNames.add(newName); }
      if (conflict) conflicts++;

      const cls   = conflict ? 'conflict' : same ? '' : 'changed';
      const state = conflict ? '⚠' : same ? '—' : '✓';
      return `<div class="ren-prow ${cls}">
        <div class="rp-old" title="${esc(file.name)}">${esc(file.name)}</div>
        <div class="rp-arr">→</div>
        <div class="rp-new" title="${esc(newName)}">${esc(newName)}</div>
        <div class="rp-st">${state}</div>
      </div>`;
    });

    list.innerHTML = rows.join('');
    const parts = [`${this.files.length} 件中 ${changed} 件が変更されます`];
    if (conflicts) parts.push(`⚠ ${conflicts} 件の名前が重複`);
    if (errors)    parts.push(`✕ ${errors} 件のエラー`);
    ftrSt.textContent = parts.join('　');

    const applyBtn = document.getElementById('ren-apply-btn');
    applyBtn.disabled = changed === 0 || errors > 0;
  },

  async apply() {
    const btn = document.getElementById('ren-apply-btn');
    btn.disabled = true;
    btn.textContent = '実行中...';
    let ok = 0, fail = 0;
    for (let i = 0; i < this.files.length; i++) {
      const file = this.files[i];
      let newName;
      try { newName = this.getNewName(file, i); } catch { fail++; continue; }
      if (!newName || newName === file.name) continue;
      try {
        await API.rename(file.path, file.dir + newName);
        ok++;
      } catch(e) { fail++; console.error('rename failed', file.path, e); }
    }
    btn.disabled = false;
    btn.textContent = 'リネーム実行';
    this.close();
    FM.setStatus(`リネーム完了: ${ok} 件${fail ? ` (失敗: ${fail})` : ''}`);
    FM.refresh(ST.active);
  },
};

// ─────────────────── TREE ───────────────────────────────────────────────────
const Tree = {
  root: null,
  nodeMap: {},
  visible: false,
  _listenerAttached: false,

  toggle() {
    this.visible = !this.visible;
    document.getElementById('sidebar').classList.toggle('hidden', !this.visible);
    document.getElementById('sidebar-resize').classList.toggle('hidden', !this.visible);
    document.getElementById('btn-tree').classList.toggle('active', this.visible);
    Layout.save();
    if (this.visible && !this.root) {
      this.init();
      Favs.init();
    } else if (this.visible) {
      this.render();
      Favs.render();
    }
  },

  async init() {
    try {
      const data = await API.listFiles('~');
      const name = data.path.replace(/.*[/\\]/, '') || data.path;
      this.root = this._makeNode(data.path, name, 0);
      this.root.expanded = true;
      this.root.loaded = true;
      this.root.children = data.items
        .filter(i => i.is_dir)
        .map(i => this._makeNode(i.path, i.name, 1));
      this.root.children.forEach(c => { this.nodeMap[c.path] = c; });
      this.nodeMap[data.path] = this.root;
      this.render();
      this._attachListener();
      this._setupResize();
    } catch(e) {
      document.getElementById('tree-content').innerHTML =
        `<div class="tree-loading" style="color:#f87171">エラー: ${esc(e.message)}</div>`;
    }
  },

  _makeNode(path, name, depth) {
    return { path, name, depth, expanded: false, loaded: false, children: [], hasKids: true };
  },

  _attachListener() {
    if (this._listenerAttached) return;
    this._listenerAttached = true;
    document.getElementById('tree-content').addEventListener('click', async e => {
      const nodeEl = e.target.closest('.tree-node');
      if (!nodeEl) return;
      const path = nodeEl.dataset.path;
      if (e.target.classList.contains('tree-toggle')) {
        await this.toggleNode(path);
      } else {
        FM.navigateTo(ST.active, path);
        this.syncHighlight(path);
      }
    });
  },

  async toggleNode(path) {
    const node = this.nodeMap[path];
    if (!node || !node.hasKids) return;
    if (node.expanded) {
      node.expanded = false;
      this.render();
      return;
    }
    if (!node.loaded) {
      try {
        const data = await API.listFiles(path);
        node.children = data.items
          .filter(i => i.is_dir)
          .map(i => {
            if (!this.nodeMap[i.path]) {
              const n = this._makeNode(i.path, i.name, node.depth + 1);
              this.nodeMap[i.path] = n;
            }
            return this.nodeMap[i.path];
          });
        node.hasKids = node.children.length > 0;
        node.loaded = true;
      } catch(e) {
        node.loaded = true;
        node.hasKids = false;
      }
    }
    node.expanded = node.hasKids;
    this.render();
  },

  refresh() {
    this.root = null;
    this.nodeMap = {};
    this._listenerAttached = false;
    document.getElementById('tree-content').innerHTML =
      '<div class="tree-loading">読み込み中...</div>';
    this.init();
  },

  syncHighlight(path) {
    if (!this.visible) return;
    document.querySelectorAll('#tree-content .tree-node').forEach(el => {
      el.classList.toggle('tree-active', el.dataset.path === path);
    });
    const active = document.querySelector(`#tree-content .tree-node[data-path="${CSS.escape(path)}"]`);
    active?.scrollIntoView({ block: 'nearest' });
  },

  _getVisible(node, result = []) {
    result.push(node);
    if (node.expanded) node.children.forEach(c => this._getVisible(c, result));
    return result;
  },

  render() {
    if (!this.root || !this.visible) return;
    const currentPath = activeTab(ST.active)?.path || '';
    const nodes = this._getVisible(this.root);
    const html = nodes.map(node => {
      const indent = node.depth * 14;
      let toggleHtml;
      if (!node.hasKids && node.loaded) {
        toggleHtml = `<span class="tree-toggle" style="opacity:0;pointer-events:none">▶</span>`;
      } else if (node.expanded) {
        toggleHtml = `<span class="tree-toggle" data-path="${esc(node.path)}" title="折りたたむ">▼</span>`;
      } else {
        toggleHtml = `<span class="tree-toggle" data-path="${esc(node.path)}" title="展開する">▶</span>`;
      }
      const active = node.path === currentPath ? ' tree-active' : '';
      return `<div class="tree-node${active}" data-path="${esc(node.path)}"
          style="padding-left:${4 + indent}px" title="${esc(node.path)}">
        ${toggleHtml}
        <span class="tree-node-icon">${node.expanded ? '📂' : '📁'}</span>
        <span class="tree-node-name">${esc(node.name)}</span>
      </div>`;
    }).join('');
    document.getElementById('tree-content').innerHTML = html;
  },

  _setupResize() {
    const resizer = document.getElementById('sidebar-resize');
    const panel   = document.getElementById('sidebar');
    let dragging = false, startX = 0, startW = 0;
    resizer.addEventListener('mousedown', e => {
      dragging = true; startX = e.clientX;
      startW = panel.getBoundingClientRect().width;
      resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const w = Math.max(140, Math.min(520, startW + e.clientX - startX));
      panel.style.width = w + 'px';
    });
    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      Layout.save();
    });
  },
};

// ── HTML escape ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── File list draggable attribute reset ──────────────────────────────────────
document.addEventListener('dragend', e => {
  const row = e.target.closest?.('.file-row');
  if (row) row.draggable = false;
});

// ── Start ────────────────────────────────────────────────────────────────────
FM.init();
</script>
